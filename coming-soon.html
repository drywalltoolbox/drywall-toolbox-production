<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drywall Toolbox | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --black-lighter: #0a0a0a;
            --blue: #2563eb;
            --blue-glow: rgba(37, 99, 235, 0.3);
            --white: #ffffff;
            --gray-light: #e5e7eb;
            --gray-dark: #374151;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Geist', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Background Effects */
        .background-glow {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, var(--blue-glow) 0%, transparent 70%);
            animation: glow-shift 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes glow-shift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 20px); }
        }

        main {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Main Container */
        .content-card {
            background: var(--black-lighter);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 8px;
            padding: 4rem 3rem;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Animated border glow */
        .content-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(37, 99, 235, 0.1), transparent);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        .content-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Logo Wrapper */
        .logo-wrapper {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .logo-wrapper svg {
            width: 400px;
            height: auto;
            filter: drop-shadow(0 0 30px var(--blue-glow));
            transition: filter 0.3s ease;
        }

        .logo-wrapper:hover svg {
            filter: drop-shadow(0 0 40px rgba(37, 99, 235, 0.5));
        }

        /* Typography */
        .tagline {
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 1rem;
            opacity: 0.9;
            font-weight: 500;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        p.description {
            font-size: 1.2rem;
            line-height: 1.7;
            color: var(--gray-light);
            max-width: 500px;
            margin: 0 auto 2.5rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Form Styling */
        .email-form {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(37, 99, 235, 0.3);
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        .email-form:focus-within {
            border-color: var(--blue);
            box-shadow: 0 0 30px var(--blue-glow);
        }

        .email-input {
            background: transparent;
            border: none;
            padding: 0.875rem 1.25rem;
            color: var(--white);
            font-family: 'Geist', sans-serif;
            flex-grow: 1;
            font-size: 0.95rem;
            outline: none;
        }

        .email-input::placeholder {
            color: var(--gray-dark);
        }

        .submit-btn {
            background: var(--blue);
            color: var(--white);
            border: none;
            padding: 0.875rem 1.75rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .submit-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Status Info */
        .status-info {
            position: relative;
            z-index: 1;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(37, 99, 235, 0.2);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-dark);
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--blue);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--blue);
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Form status messages */
        .form-message {
            margin-top: 1rem;
            padding: 0.75rem 1.25rem;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 500;
            display: none;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-message.success {
            background: rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(37, 99, 235, 0.4);
            color: #93c5fd;
            display: block;
        }

        .form-message.error {
            background: rgba(220, 38, 38, 0.12);
            border: 1px solid rgba(220, 38, 38, 0.35);
            color: #fca5a5;
            display: block;
        }

        /* Honeypot field — visually hidden from humans, present in DOM for bots */
        .dtb-hp-field {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            main {
                padding: 1.5rem;
            }

            .content-card {
                padding: 3rem 2rem;
            }

            .logo-wrapper svg {
                width: 320px;
            }

            .email-form {
                flex-direction: column;
            }

            .submit-btn {
                justify-content: center;
            }
        }

        @media (max-width: 640px) {
            .content-card {
                padding: 2rem 1.5rem;
            }

            .logo-wrapper svg {
                width: 280px;
            }

            p.description {
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }

            .status-info {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <main>
        <div class="content-card">
            <span class="tagline">Professional Drywall Equipment</span>
            
            <div class="logo-wrapper">
                <svg viewBox="0 0 2048 1070" xmlns="http://www.w3.org/2000/svg" aria-label="Drywall Toolbox">
                    <path transform="translate(1131,376)" d="m0 0h436l1 3-22 89-19 74-20 79-3 9-1 1-578 1-14 12-13 11-10 8-11 8h-2l1-5 10-35 15-57 24-91 16-59 12-45 2-2zm269 40-2 1-16 70-9 39-14 59-1 8h32l3-7 19-81 16-69 3-12v-7l-16-1zm62 0-6 24-16 67-13 55-7 27v4h33l6-21 15-63 17-70 4-17v-5l-10-1zm-249 0-6 9-16 31-12 22-17 32-12 22-9 16v2h-3v-19l-3-86-2-28h-42l-8 14-23 45-18 34-14 26-7 14-3 1v-27l-2-59-2-44-1-4h-37l2 32 3 40 3 55 2 24 1 21 1 4h41l6-9 14-27 12-22 12-24 10-19 15-30 1-3 4-1v33l2 101 1 1h42l8-13 44-77 14-25 13-23 15-28 5-10-1-1zm36 46-3 7-3 14 1 4h61l7 3 5 5 2 5v7l-3 5-6 1-59 1-13 4-11 7-7 7-5 9-4 11v17l4 11 7 7 8 4 13 2 87-1 5-16 14-61 3-16v-9l-2-9-5-8-8-7-7-3-5-1z" fill="#2563eb"/>

                </svg>
            </div>

            <p class="description">
                Sign up and be the first to know when we launch.
            </p>

            <!--
                Form integration with WordPress
                ─────────────────────────────────────────────────────────────────
                Primary path  : JavaScript intercepts submit → AJAX POST to
                                /wp-json/dtb/v1/subscribe (REST API).
                Fallback path : If JS is unavailable or the fetch fails, the
                                form falls back to a traditional POST to
                                /wp-admin/admin-post.php, handled by the
                                admin_post_nopriv_dtb_subscribe hook in
                                wp/wp-content/mu-plugins/dtb-coming-soon.php.
            -->
            <form
                class="email-form"
                id="signupForm"
                action="/wp-admin/admin-post.php"
                method="POST"
                novalidate
            >
                <!-- WordPress admin-post.php dispatcher — triggers dtb_subscribe hook -->
                <input type="hidden" name="action" value="dtb_subscribe">

                <!-- CSRF nonce — populated by JS on page-load via /wp-json/dtb/v1/subscribe-nonce.
                     Required only for the no-JS admin-post.php fallback path. -->
                <input type="hidden" name="_dtb_nonce" id="dtb_nonce_field" value="">

                <!-- Honeypot — must stay empty; bots that auto-fill all fields will be blocked -->
                <span class="dtb-hp-field" aria-hidden="true">
                    <label for="dtb_hp">Leave this field blank</label>
                    <input
                        type="text"
                        id="dtb_hp"
                        name="_dtb_hp"
                        value=""
                        autocomplete="off"
                        tabindex="-1"
                    >
                </span>

                <input
                    type="email"
                    name="dtb_email"
                    id="dtb_email_input"
                    class="email-input"
                    placeholder="Enter professional email"
                    autocomplete="email"
                    required
                >
                <button type="submit" class="submit-btn" id="dtb_submit_btn">
                    Notify Me
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <!-- Status message shown after submission (JS path) or via ?status= param (fallback) -->
            <p class="form-message" id="dtb_form_message" role="alert" aria-live="polite"></p>

            <div class="status-info">
                <span class="status-dot"></span>Status: Launching Soon
            </div>
        </div>
    </main>

    <script>
        // ─── WordPress REST API base URL ───────────────────────────────────────
        // Matches the rewrite rule in .htaccess:
        //   RewriteRule ^wp-json/(.*)$ wp/index.php?rest_route=/$1 [QSA,L]
        const DTB_API_BASE = '/wp-json/dtb/v1';

        // Arrow SVG reused when re-enabling the submit button after an error.
        const ARROW_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

        // ─── DOM references ────────────────────────────────────────────────────
        const form       = document.getElementById('signupForm');
        const emailInput = document.getElementById('dtb_email_input');
        const submitBtn  = document.getElementById('dtb_submit_btn');
        const msgEl      = document.getElementById('dtb_form_message');
        const nonceField = document.getElementById('dtb_nonce_field');
        const honeypot   = document.querySelector('[name="_dtb_hp"]');

        // ─── Helper: show feedback message ────────────────────────────────────
        function showMessage(text, type /* 'success' | 'error' */) {
            msgEl.textContent  = text;
            msgEl.className    = 'form-message ' + type;
        }

        // ─── Helper: transition to success state ──────────────────────────────
        function showSuccess(message) {
            submitBtn.innerHTML = 'Secured ✓';
            submitBtn.style.background = '#1d4ed8';
            submitBtn.disabled = true;
            emailInput.value   = '';
            emailInput.placeholder = 'You\'re on the list.';
            emailInput.disabled    = true;
            showMessage(message || 'You\'re on the list. We\'ll be in touch!', 'success');
        }

        // ─── Helper: reset button to allow retry ──────────────────────────────
        function resetButton() {
            submitBtn.disabled  = false;
            submitBtn.innerHTML = 'Notify Me ' + ARROW_SVG;
        }

        // ─── On page load: check for ?status= from admin-post.php redirect ───
        // This handles the no-JS fallback path where the browser is redirected
        // back to coming-soon.html?status=success after a server-side POST.
        (function handleUrlStatus() {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');
            if (!status) return;

            // Clean the URL without reloading the page.
            history.replaceState({}, '', window.location.pathname);

            if (status === 'success') {
                showSuccess();
            } else if (status === 'error') {
                const errorMessages = {
                    invalid_token : 'Session expired. Please refresh and try again.',
                    invalid_email : 'Please enter a valid e-mail address.',
                    rate_limited  : 'Too many attempts. Please try again later.',
                };
                const code = params.get('msg') || 'unknown';
                showMessage(errorMessages[code] || 'Something went wrong. Please try again.', 'error');
            }
        })();

        // ─── Pre-fetch a WP nonce for the admin-post.php fallback ─────────────
        // If JavaScript and the REST API are both available the form uses AJAX.
        // If AJAX fails (network error), the form falls back to a traditional
        // POST to /wp-admin/admin-post.php which requires this nonce.
        (function prefetchNonce() {
            fetch(DTB_API_BASE + '/subscribe-nonce', { credentials: 'same-origin' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data && data.nonce) {
                        nonceField.value = data.nonce;
                    }
                })
                .catch(function() {
                    // Nonce unavailable — the AJAX path does not need it.
                    // The form fallback will fail CSRF validation in this case
                    // but the AJAX path will still work normally.
                });
        })();

        // ─── Form submit handler ───────────────────────────────────────────────
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = emailInput.value.trim();

            // Client-side validation before hitting the server.
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage('Please enter a valid e-mail address.', 'error');
                return;
            }

            // Disable button to prevent double-submissions.
            submitBtn.disabled  = true;
            submitBtn.innerHTML = 'Sending&hellip;';
            msgEl.className     = 'form-message'; // hide any previous message

            try {
                // ── Primary path: AJAX POST to WordPress REST API ─────────────
                const response = await fetch(DTB_API_BASE + '/subscribe', {
                    method      : 'POST',
                    credentials : 'same-origin',
                    headers     : { 'Content-Type': 'application/json' },
                    body        : JSON.stringify({
                        email   : email,
                        _dtb_hp : honeypot ? honeypot.value : '', // honeypot field
                    }),
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showSuccess(data.message);
                } else {
                    // Server returned a structured error (400, 429, etc.).
                    const msg = (data && (data.message || (data.data && data.data.message)))
                        || 'Something went wrong. Please try again.';
                    showMessage(msg, 'error');
                    resetButton();
                }

            } catch (networkError) {
                // ── Fallback path: traditional form POST to admin-post.php ────
                // The AJAX fetch failed (e.g. no network, server unreachable).
                // Submit the HTML form the old-fashioned way so the user's
                // entry is not lost. The PHP handler will redirect back here
                // with ?status=success or ?status=error.
                if (nonceField.value) {
                    form.submit();
                } else {
                    showMessage('Network error. Please check your connection and try again.', 'error');
                    resetButton();
                }
            }
        });

        // ─── Subtle parallax on scroll ─────────────────────────────────────────
        window.addEventListener('scroll', function() {
            const card    = document.querySelector('.content-card');
            const scrollY = window.scrollY;
            card.style.transform = 'translateY(' + (scrollY * 0.3) + 'px)';
        });
    </script>
</body>
</html>
