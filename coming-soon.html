<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Professional drywall tools and equipment from top brands. Sign up for early access.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Drywall Toolbox">
    <title>Drywall Toolbox | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Preview mode: instantly resolve animations (screenshot/CI only) -->
    <script>
        if (new URLSearchParams(location.search).has('preview')) {
            document.documentElement.setAttribute('data-preview', '');
        }
    </script>
    <style>
        @property --ba { syntax: '<angle>'; initial-value: 0deg; inherits: false; }

        :root {
            --black:       #000000;
            --card-bg:     rgba(11, 13, 28, 0.84);
            --blue:        #2563eb;
            --blue-light:  #3b82f6;
            --blue-soft:   #60a5fa;
            --blue-pale:   #93c5fd;
            --white:       #ffffff;
            --txt:         rgba(255,255,255,.92);
            --txt-muted:   rgba(255,255,255,.50);
            --txt-faint:   rgba(255,255,255,.24);
            --border-dim:  rgba(255,255,255,.055);
            --border-blue: rgba(37,99,235,.30);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:100%; height:100%; }

        body {
            background: var(--black);
            color: var(--txt);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow-x: hidden; position: relative;
        }

        #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

        .ambient { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
        .blob { position:absolute; border-radius:50%; filter:blur(88px); }
        .blob--a {
            width:min(60vw,560px); height:min(60vw,560px);
            background:radial-gradient(circle,rgba(37,99,235,.28) 0%,rgba(30,58,138,.13) 55%,transparent 100%);
            top:-14%; left:-8%; animation:blobDrift 15s ease-in-out infinite;
        }
        .blob--b {
            width:min(52vw,480px); height:min(52vw,480px);
            background:radial-gradient(circle,rgba(29,78,216,.22) 0%,rgba(30,58,138,.10) 55%,transparent 100%);
            bottom:-14%; right:-8%; animation:blobDrift 19s ease-in-out infinite reverse; animation-delay:-8s;
        }
        .blob--c {
            width:min(32vw,300px); height:min(32vw,300px);
            background:radial-gradient(circle,rgba(59,130,246,.11) 0%,transparent 70%);
            top:44%; left:55%; transform:translate(-50%,-50%);
            animation:blobDrift 22s ease-in-out infinite; animation-delay:-5s;
        }
        @keyframes blobDrift {
            0%,100%{transform:translate(0,0) scale(1)}
            33%{transform:translate(2%,4%) scale(1.04)}
            66%{transform:translate(-2%,-2%) scale(.97)}
        }

        .grid-overlay {
            position:fixed; inset:0; z-index:2; pointer-events:none;
            background-image:
                linear-gradient(rgba(37,99,235,.032) 1px,transparent 1px),
                linear-gradient(90deg,rgba(37,99,235,.032) 1px,transparent 1px);
            background-size:56px 56px;
        }

        .card-outer {
            position:relative; width:100%; border-radius:20px; padding:1.5px;
            background:conic-gradient(from var(--ba),
                rgba(37,99,235,.05) 0deg,rgba(37,99,235,.60) 50deg,
                rgba(59,130,246,.80) 95deg,rgba(37,99,235,.60) 140deg,
                rgba(37,99,235,.05) 195deg,rgba(37,99,235,.05) 360deg);
            box-shadow:
                0 0 0 1px rgba(37,99,235,.14),
                0 28px 70px rgba(0,0,0,.80),
                0 0 55px rgba(37,99,235,.06);
            animation:cardIn .9s cubic-bezier(.16,1,.3,1) both,spinBorder 5.5s linear infinite;
            will-change:transform;
        }
        @keyframes spinBorder{to{--ba:360deg}}
        @keyframes cardIn{from{opacity:0;transform:translateY(34px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

        .content-card {
            position:relative; background:var(--card-bg);
            backdrop-filter:blur(28px) saturate(160%);
            -webkit-backdrop-filter:blur(28px) saturate(160%);
            border-radius:18.5px; padding:2rem 1.375rem 1.75rem;
            overflow:hidden; width:100%;
        }
        .content-card::after {
            content:''; position:absolute; inset:0; border-radius:18.5px;
            background:radial-gradient(ellipse 90% 55% at 50% 0%,rgba(37,99,235,.10) 0%,transparent 68%);
            pointer-events:none; z-index:0;
        }

        main {
            position:relative; z-index:10; width:100%; max-width:600px;
            padding:1rem 1.125rem;
            text-align:center;
            overflow:hidden;
        }

        @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        .fadeup{animation:fadeUp .75s cubic-bezier(.16,1,.3,1) both}

        .eyebrow {
            display:inline-flex; align-items:center; gap:.45rem;
            font-size:.62rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
            color:var(--blue-soft);
            background:rgba(37,99,235,.08); border:1px solid rgba(37,99,235,.20);
            padding:.3rem .825rem; border-radius:100px;
            margin-bottom:1.125rem; position:relative; z-index:1; animation-delay:.08s;
        }
        .eyebrow-dot {
            width:5px; height:5px; border-radius:50%;
            background:var(--blue-soft); box-shadow:0 0 7px var(--blue-soft);
            animation:pulse 2.3s ease-in-out infinite; flex-shrink:0;
        }

        .logo-wrap {
            display:flex; align-items:center; justify-content:center;
            margin-bottom:1.25rem; position:relative; z-index:1; animation-delay:.16s;
        }
        .logo-img {
            display:block; width:100%; max-width:195px; height:auto;
            filter:drop-shadow(0 0 20px rgba(37,99,235,.45)) brightness(1.05);
            animation:logoFloat 7s ease-in-out infinite;
            transition:filter .4s ease;
        }
        .logo-wrap:hover .logo-img{filter:drop-shadow(0 0 34px rgba(59,130,246,.65)) brightness(1.1)}
        @keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

        .headline {
            font-size:clamp(2.1rem,8.5vw,3.5rem);
            font-weight:800; letter-spacing:-.045em; line-height:1.08;
            margin-bottom:.625rem; position:relative; z-index:1; animation-delay:.24s;
            background:linear-gradient(128deg,#c7d9ff 0%,var(--blue-pale) 22%,#fff 45%,var(--blue-pale) 68%,#c7d9ff 100%);
            background-size:220% auto;
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .headline.sweep{animation:fadeUp .75s cubic-bezier(.16,1,.3,1) .24s both,sweep 5s linear infinite}
        @keyframes sweep{to{background-position:220% center}}

        .sub-headline {
            font-size:clamp(.85rem,2.6vw,1rem); font-weight:400;
            color:var(--txt-muted); line-height:1.68;
            max-width:380px; margin:0 auto 1.625rem;
            position:relative; z-index:1; animation-delay:.32s;
        }

        .countdown-wrap{position:relative;z-index:1;margin-bottom:1.625rem;animation-delay:.40s}
        .countdown{display:inline-flex;align-items:flex-start;gap:clamp(.3rem,1.2vw,.55rem)}
        .cd-unit{display:flex;flex-direction:column;align-items:center;gap:.25rem}
        .cd-num {
            display:flex; align-items:center; justify-content:center;
            min-width:clamp(44px,10.5vw,62px);
            padding:clamp(.38rem,1.2vw,.55rem) .2rem;
            background:rgba(37,99,235,.07); border:1px solid rgba(37,99,235,.17);
            border-radius:9px;
            font-size:clamp(1.1rem,4vw,1.6rem); font-weight:700; letter-spacing:-.02em;
            font-variant-numeric:tabular-nums; color:var(--white);
            box-shadow:0 0 16px rgba(37,99,235,.05),inset 0 1px 0 rgba(255,255,255,.04);
        }
        .cd-num.flipping{animation:numFlip .26s cubic-bezier(.34,1.56,.64,1)}
        .cd-label{font-size:clamp(.52rem,1.3vw,.6rem);font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--txt-faint)}
        .cd-sep{
            font-size:clamp(1.1rem,4vw,1.6rem);font-weight:700;
            color:rgba(37,99,235,.48);margin-top:clamp(.32rem,1.2vw,.50rem);
            animation:blink 1s step-end infinite;line-height:1;
        }
        @keyframes numFlip{0%{transform:translateY(-9px);opacity:0}100%{transform:translateY(0);opacity:1}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

        .divider {
            width:100%; height:1px;
            background:linear-gradient(90deg,transparent 0%,var(--border-blue) 30%,var(--border-blue) 70%,transparent 100%);
            margin-bottom:1.375rem; position:relative; z-index:1; animation-delay:.46s;
        }

        .form-label {
            display:block; font-size:.75rem; font-weight:500;
            color:var(--txt-muted); letter-spacing:.03em;
            margin-bottom:.55rem; position:relative; z-index:1; animation-delay:.50s;
        }

        .email-form {
            display:flex; flex-direction:column; gap:.575rem;
            max-width:460px; width:100%; margin:0 auto;
            position:relative; z-index:1; animation-delay:.50s;
        }
        .input-wrap{position:relative;display:flex;align-items:center}
        .input-icon {
            position:absolute; left:.875rem; pointer-events:none;
            color:rgba(255,255,255,.2); transition:color .3s ease; z-index:2; flex-shrink:0;
        }
        .input-wrap:focus-within .input-icon{color:rgba(59,130,246,.6)}
        .email-input {
            background:rgba(255,255,255,.04); border:1px solid var(--border-dim);
            border-radius:10px; padding:.82rem 1rem .82rem 2.55rem;
            color:var(--white); font-family:'Inter',sans-serif;
            font-size:1rem; width:100%; min-width:0; outline:none;
            transition:border-color .3s ease,box-shadow .3s ease,background .3s ease;
        }
        .email-input::placeholder{color:rgba(255,255,255,.2)}
        .email-input:focus {
            border-color:rgba(37,99,235,.5); background:rgba(37,99,235,.04);
            box-shadow:0 0 0 3px rgba(37,99,235,.13),0 0 26px rgba(37,99,235,.07);
        }

        .submit-btn {
            position:relative; overflow:hidden; background:var(--blue); color:var(--white);
            border:none; padding:.82rem 1.5rem; border-radius:10px;
            font-family:'Inter',sans-serif; font-weight:600; font-size:.85rem;
            text-transform:uppercase; letter-spacing:.07em; cursor:pointer;
            width:100%; display:flex; align-items:center; justify-content:center; gap:.45rem;
            touch-action:manipulation;
            transition:background .25s ease,transform .2s ease,box-shadow .25s ease;
            box-shadow:0 4px 20px rgba(37,99,235,.3),inset 0 1px 0 rgba(255,255,255,.12);
        }
        .submit-btn::before {
            content:''; position:absolute; top:0; left:-80%; width:50%; height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);
            transform:skewX(-18deg); pointer-events:none;
        }
        .submit-btn:hover::before{animation:shimmer .6s ease forwards}
        .submit-btn:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,99,235,.42),inset 0 1px 0 rgba(255,255,255,.12)}
        .submit-btn:active{transform:translateY(0);box-shadow:0 2px 10px rgba(37,99,235,.2)}
        @keyframes shimmer{to{left:120%}}

        .form-message{margin-top:.55rem;padding:.7rem .9rem;border-radius:8px;font-size:.85rem;font-weight:500;line-height:1.5;display:none;text-align:left;position:relative;z-index:1}
        .form-message.success{background:rgba(37,99,235,.10);border:1px solid rgba(37,99,235,.30);color:var(--blue-pale);display:block;animation:fadeUp .4s cubic-bezier(.16,1,.3,1)}
        .form-message.error{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.26);color:#fca5a5;display:block;animation:fadeUp .4s cubic-bezier(.16,1,.3,1)}

        .dtb-hp-field{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none}

        .trust-bar {
            display:flex; align-items:center; justify-content:center; flex-wrap:wrap;
            gap:.625rem 1.375rem; margin-top:1.5rem; padding-top:1.25rem;
            border-top:1px solid rgba(255,255,255,.05);
            position:relative; z-index:1; animation-delay:.58s;
        }
        .trust-item{display:inline-flex;align-items:center;gap:.35rem;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);white-space:nowrap}
        .trust-item svg{color:rgba(59,130,246,.55);flex-shrink:0}

        .status-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.60rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.26);margin-top:1rem;position:relative;z-index:1;animation-delay:.65s}
        .status-dot{width:5px;height:5px;border-radius:50%;background:var(--blue-soft);box-shadow:0 0 8px var(--blue-soft);animation:pulse 2.3s ease-in-out infinite}

        @keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.25)}}

        /* Popup */
        .popup-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:1.25rem;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .3s ease}
        .popup-overlay.is-open{opacity:1;pointer-events:auto}
        .popup-card{background:rgba(10,12,26,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(37,99,235,.28);border-radius:18px;padding:2.25rem 1.75rem 2rem;max-width:400px;width:100%;position:relative;box-shadow:0 24px 72px rgba(0,0,0,.9),0 0 0 1px rgba(37,99,235,.07),0 0 55px rgba(37,99,235,.06);transform:translateY(26px) scale(.96);transition:transform .42s cubic-bezier(.16,1,.3,1),opacity .3s ease;opacity:0;text-align:center}
        .popup-card::after{content:'';position:absolute;inset:0;border-radius:18px;background:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(37,99,235,.10) 0%,transparent 68%);pointer-events:none}
        .popup-overlay.is-open .popup-card{transform:translateY(0) scale(1);opacity:1}
        .popup-close{position:absolute;top:.875rem;right:.875rem;background:none;border:none;color:rgba(255,255,255,.26);cursor:pointer;padding:.3rem;line-height:1;transition:color .2s ease,background .2s ease;z-index:1;display:flex;align-items:center;justify-content:center;border-radius:6px}
        .popup-close:hover{color:var(--white);background:rgba(255,255,255,.06)}
        .popup-icon{width:60px;height:60px;border-radius:50%;background:rgba(37,99,235,.10);border:2px solid rgba(37,99,235,.30);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;position:relative;z-index:1;animation:iconPop .5s cubic-bezier(.34,1.56,.64,1) .2s both}
        @keyframes iconPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
        .popup-icon svg{color:var(--blue-light)}
        .popup-title{font-size:1.2rem;font-weight:700;letter-spacing:-.025em;color:var(--white);margin-bottom:.5rem;position:relative;z-index:1}
        .popup-body{font-size:.875rem;line-height:1.65;color:var(--txt-muted);margin-bottom:1.75rem;position:relative;z-index:1}
        .popup-dismiss{background:var(--blue);color:var(--white);border:none;padding:.75rem 2.25rem;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:.875rem;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:background .25s ease,transform .2s ease,box-shadow .25s ease;position:relative;z-index:1;touch-action:manipulation;box-shadow:0 4px 18px rgba(37,99,235,.3)}
        .popup-dismiss:hover{background:#1d4ed8;transform:translateY(-2px);box-shadow:0 8px 26px rgba(37,99,235,.42)}
        .popup-dismiss:active{transform:translateY(0)}

        /* Responsive */
        @media(min-width:480px){.content-card{padding:2.5rem 1.875rem 2.125rem}.logo-img{max-width:240px}}
        @media(min-width:640px){main{padding:1.25rem 1.5rem}.content-card{padding:3rem 2.375rem 2.5rem}.logo-img{max-width:290px}.email-form{flex-direction:row}.email-form .input-wrap{flex:1}.submit-btn{width:auto;white-space:nowrap}}
        @media(min-width:900px){main{max-width:620px;padding:1.5rem 2rem}.content-card{padding:3.375rem 2.875rem 2.875rem}.logo-img{max-width:320px}}

        /* Preview mode — disable delays for clean screenshots */
        [data-preview] .fadeup,
        [data-preview] .card-outer,
        [data-preview] .headline,
        [data-preview] .headline.sweep {
            animation-duration:.001ms !important;
            animation-delay:0s !important;
        }
        [data-preview] .logo-img,[data-preview] .eyebrow-dot,
        [data-preview] .status-dot,[data-preview] .cd-sep,
        [data-preview] .cd-num{animation:none !important}

        /* Reduced motion */
        @media(prefers-reduced-motion:reduce){
            *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
            .submit-btn:hover,.popup-dismiss:hover{transform:none}
            .logo-img{animation:none}
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <div class="ambient" aria-hidden="true">
        <div class="blob blob--a"></div>
        <div class="blob blob--b"></div>
        <div class="blob blob--c"></div>
    </div>

    <div class="grid-overlay" aria-hidden="true"></div>

    <main>
        <div class="card-outer">
            <div class="content-card">

                <div class="eyebrow fadeup" aria-hidden="true">
                    <span class="eyebrow-dot"></span>
                    Professional Drywall Equipment
                </div>

                <div class="logo-wrap fadeup">
                    <img
                        src="logos/drywall-logo-white.png"
                        alt="Drywall Toolbox"
                        class="logo-img"
                        width="320"
                        height="98"
                        decoding="async"
                        fetchpriority="high"
                    >
                </div>

                <h1 class="headline sweep fadeup">Coming Soon</h1>

                <p class="sub-headline fadeup">
                    Sign up and be the first to know when we launch.
                </p>

                <div class="countdown-wrap fadeup">
                    <div class="countdown" role="timer" aria-label="Countdown to launch" aria-live="off">
                        <div class="cd-unit">
                            <span class="cd-num" id="cd-days">--</span>
                            <span class="cd-label">Days</span>
                        </div>
                        <span class="cd-sep" aria-hidden="true">:</span>
                        <div class="cd-unit">
                            <span class="cd-num" id="cd-hours">--</span>
                            <span class="cd-label">Hours</span>
                        </div>
                        <span class="cd-sep" aria-hidden="true">:</span>
                        <div class="cd-unit">
                            <span class="cd-num" id="cd-mins">--</span>
                            <span class="cd-label">Mins</span>
                        </div>
                        <span class="cd-sep" aria-hidden="true">:</span>
                        <div class="cd-unit">
                            <span class="cd-num" id="cd-secs">--</span>
                            <span class="cd-label">Secs</span>
                        </div>
                    </div>
                </div>

                <div class="divider fadeup" aria-hidden="true"></div>

                <label class="form-label fadeup" for="dtb_email_input">
                    Get early access &mdash; enter your email below
                </label>

                <!--
                    Form integration:
                    Primary  → AJAX POST /wp-json/dtb/v1/subscribe (REST API)
                    Fallback → POST /wp-admin/admin-post.php (no-JS / network error)
                    Handler  → wp/wp-content/mu-plugins/dtb-coming-soon.php
                -->
                <form
                    class="email-form fadeup"
                    id="signupForm"
                    action="/wp-admin/admin-post.php"
                    method="POST"
                    novalidate
                >
                    <input type="hidden" name="action"     value="dtb_subscribe">
                    <input type="hidden" name="_dtb_nonce" id="dtb_nonce_field" value="">

                    <span class="dtb-hp-field" aria-hidden="true">
                        <label for="dtb_hp">Leave this field blank</label>
                        <input type="text" id="dtb_hp" name="_dtb_hp" value="" autocomplete="off" tabindex="-1">
                    </span>

                    <div class="input-wrap">
                        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect width="20" height="16" x="2" y="4" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                        <input
                            type="email" name="dtb_email" id="dtb_email_input"
                            class="email-input" placeholder="Enter your email address"
                            autocomplete="email" required
                        >
                    </div>

                    <button type="submit" class="submit-btn" id="dtb_submit_btn">
                        Notify Me
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </form>

                <p class="form-message" id="dtb_form_message" role="alert" aria-live="polite"></p>

                <div class="trust-bar fadeup" aria-label="Trust indicators">
                    <span class="trust-item">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        Professional Grade
                    </span>
                    <span class="trust-item">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>
                        Reliable Support
                    </span>
                    <span class="trust-item">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="14" x="2" y="7" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                        Fast Shipping
                    </span>
                </div>

                <div class="status-badge fadeup">
                    <span class="status-dot" aria-hidden="true"></span>
                    Status: Launching Soon
                </div>

            </div>
        </div>
    </main>


    <div class="popup-overlay" id="dtb_popup" role="dialog" aria-modal="true"
         aria-labelledby="dtb_popup_title" aria-describedby="dtb_popup_body" aria-hidden="true">
        <div class="popup-card" id="dtb_popup_card">
            <button class="popup-close" id="dtb_popup_close" aria-label="Close" type="button">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <div class="popup-icon" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
            <h2 class="popup-title" id="dtb_popup_title">You're on the list!</h2>
            <p class="popup-body"  id="dtb_popup_body">We'll let you know the moment we launch. Keep an eye on your inbox.</p>
            <button class="popup-dismiss" id="dtb_popup_dismiss" type="button">Got it</button>
        </div>
    </div>


    <script>
        /* PARTICLE CANVAS */
        (function(){
            var canvas=document.getElementById('bg-canvas');
            if(!canvas||!canvas.getContext)return;
            var ctx=canvas.getContext('2d');
            var COUNT=window.innerWidth<600?42:75;
            var p=[];
            function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
            resize();
            window.addEventListener('resize',resize,{passive:true});
            for(var i=0;i<COUNT;i++)p.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.35+.35,dx:(Math.random()-.5)*.26,dy:(Math.random()-.5)*.26,a:Math.random()*.42+.08});
            var LINK=108;
            function draw(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                for(var i=0;i<p.length;i++){var q=p[i];q.x+=q.dx;q.y+=q.dy;if(q.x<0)q.x=canvas.width;if(q.x>canvas.width)q.x=0;if(q.y<0)q.y=canvas.height;if(q.y>canvas.height)q.y=0;ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,Math.PI*2);ctx.fillStyle='rgba(59,130,246,'+q.a+')';ctx.fill()}
                ctx.lineWidth=.6;
                for(var i=0;i<p.length-1;i++)for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<LINK){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle='rgba(37,99,235,'+(0.052*(1-d/LINK))+')';ctx.stroke()}}
                requestAnimationFrame(draw);
            }
            if(!window.matchMedia('(prefers-reduced-motion:reduce)').matches)draw();
        })();

        /* COUNTDOWN */
        (function(){
            var LAUNCH=new Date('2026-09-01T09:00:00');
            var elD=document.getElementById('cd-days'),elH=document.getElementById('cd-hours'),elM=document.getElementById('cd-mins'),elS=document.getElementById('cd-secs');
            function pad(n){return n<10?'0'+n:String(n)}
            function set(el,val){if(!el||el.textContent===val)return;el.textContent=val;el.classList.remove('flipping');void el.offsetWidth;el.classList.add('flipping')}
            function tick(){var diff=LAUNCH.getTime()-Date.now();if(diff<=0){set(elD,'00');set(elH,'00');set(elM,'00');set(elS,'00');return}set(elD,pad(Math.floor(diff/86400000)));set(elH,pad(Math.floor((diff%86400000)/3600000)));set(elM,pad(Math.floor((diff%3600000)/60000)));set(elS,pad(Math.floor((diff%60000)/1000)))}
            tick();setInterval(tick,1000);
        })();

        /* MOUSE PARALLAX */
        (function(){
            if(!window.matchMedia('(hover:hover) and (pointer:fine)').matches||window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;
            var outer=document.querySelector('.card-outer');if(!outer)return;
            var raf=null,tx=0,ty=0;
            document.addEventListener('mousemove',function(e){var cx=window.innerWidth/2,cy=window.innerHeight/2;tx=((e.clientX-cx)/cx)*4.5;ty=((e.clientY-cy)/cy)*4.5;if(!raf)raf=requestAnimationFrame(tilt)},{passive:true});
            document.addEventListener('mouseleave',function(){tx=0;ty=0;outer.style.transition='transform .6s ease';outer.style.transform='perspective(1400px) rotateY(0deg) rotateX(0deg)';setTimeout(function(){outer.style.transition=''},600)});
            function tilt(){outer.style.transform='perspective(1400px) rotateY('+tx+'deg) rotateX('+(-ty)+'deg)';raf=null}
        })();

        /* WORDPRESS REST API + FORM */
        var DTB_API='/wp-json/dtb/v1';
        var ARROW='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
        var form=document.getElementById('signupForm'),emailInput=document.getElementById('dtb_email_input'),submitBtn=document.getElementById('dtb_submit_btn'),msgEl=document.getElementById('dtb_form_message'),nonceField=document.getElementById('dtb_nonce_field'),honeypot=document.querySelector('[name="_dtb_hp"]'),popup=document.getElementById('dtb_popup'),popupClose=document.getElementById('dtb_popup_close'),popupDismiss=document.getElementById('dtb_popup_dismiss');
        var FOCUSABLE='button:not([disabled]),[href],input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])';
        var _pf=null,_so='';
        function openPopup(){_pf=document.activeElement;popup.removeAttribute('aria-hidden');popup.classList.add('is-open');_so=document.body.style.overflow;var sw=window.innerWidth-document.documentElement.clientWidth;document.body.style.paddingRight=sw?sw+'px':'';document.body.style.overflow='hidden';requestAnimationFrame(function(){popupClose.focus()})}
        function closePopup(){popup.classList.remove('is-open');popup.setAttribute('aria-hidden','true');document.body.style.overflow=_so;document.body.style.paddingRight='';if(_pf)_pf.focus()}
        popupClose.addEventListener('click',closePopup);popupDismiss.addEventListener('click',closePopup);
        popup.addEventListener('click',function(e){if(e.target===popup)closePopup()});
        document.addEventListener('keydown',function(e){if(!popup.classList.contains('is-open'))return;if(e.key==='Escape'){closePopup();return}if(e.key==='Tab'){var els=Array.from(popup.querySelectorAll(FOCUSABLE));if(!els.length)return;if(e.shiftKey){if(document.activeElement===els[0]){e.preventDefault();els[els.length-1].focus()}}else{if(document.activeElement===els[els.length-1]){e.preventDefault();els[0].focus()}}}});
        function showMsg(t,c){msgEl.textContent=t;msgEl.className='form-message '+c}
        function showSuccess(){submitBtn.innerHTML='Secured \u2713';submitBtn.style.background='#1d4ed8';submitBtn.disabled=true;emailInput.value='';emailInput.placeholder="You're on the list.";emailInput.disabled=true;openPopup()}
        function resetBtn(){submitBtn.disabled=false;submitBtn.innerHTML='Notify Me '+ARROW}
        (function(){var params=new URLSearchParams(location.search);var s=params.get('status');if(!s)return;history.replaceState({},'',location.pathname);if(s==='success'){showSuccess()}else if(s==='error'){var msgs={invalid_token:'Session expired. Please refresh and try again.',invalid_email:'Please enter a valid e-mail address.',rate_limited:'Too many attempts. Please try again later.'};showMsg(msgs[params.get('msg')]||'Something went wrong. Please try again.','error')}})();
        (function(){fetch(DTB_API+'/subscribe-nonce',{credentials:'same-origin'}).then(function(r){return r.json()}).then(function(d){if(d&&d.nonce)nonceField.value=d.nonce}).catch(function(){})})();
        form.addEventListener('submit',async function(e){
            e.preventDefault();
            var email=emailInput.value.trim();
            if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('Please enter a valid e-mail address.','error');return}
            submitBtn.disabled=true;submitBtn.innerHTML='Sending\u2026';msgEl.className='form-message';
            try{
                var r=await fetch(DTB_API+'/subscribe',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,_dtb_hp:honeypot?honeypot.value:''})});
                var d=await r.json();
                if(r.ok&&d.success){showSuccess()}else{showMsg((d&&(d.message||(d.data&&d.data.message)))||'Something went wrong. Please try again.','error');resetBtn()}
            }catch(_){if(nonceField.value){form.submit()}else{showMsg('Network error. Please check your connection and try again.','error');resetBtn()}}
        });
    </script>
</body>
</html>
