<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Drywall Toolbox | Precision Engineering</title>
    <link rel="icon" href="/logos/favicon.ico" sizes="any">
    <link rel="shortcut icon" href="/logos/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/logos/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/logos/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/logos/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/logos/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gypsum-white: #f8fafc;
            --dust-gray: #94a3b8;
            --muted-gray: rgba(148, 163, 184, 0.68);
            --brand-blue: #2563eb;
            --brand-blue-strong: #1d4ed8;
            --deep-slate: #020617;
            --field-bg: rgba(255,255,255,0.04);
            --field-border: rgba(248,250,252,0.12);
            --field-border-focus: rgba(37,99,235,0.68);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-slate);
            color: var(--gypsum-white);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(env(safe-area-inset-top, 0px), 2.5rem)
                     max(env(safe-area-inset-right, 0px), 1.5rem)
                     max(env(safe-area-inset-bottom, 0px), 2.5rem)
                     max(env(safe-area-inset-left, 0px), 1.5rem);
        }

        .gypsum-grain {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.38;
            mix-blend-mode: overlay;
        }

        #dust-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .ambient-glow {
            position: fixed;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 70%);
            z-index: 2;
            filter: blur(100px);
            pointer-events: none;
        }

        .brand-float {
            position: fixed;
            pointer-events: none;
            user-select: none;
            z-index: 3;
            opacity: 0.055;
            filter: invert(1) grayscale(1);
            will-change: transform;
        }

        .brand-float--white { filter: grayscale(1); }
        .brand-float--bkg { filter: grayscale(1) sepia(1) hue-rotate(180deg) brightness(1.6); opacity: 0.07; }
        .brand-float img { display: block; width: 100%; height: auto; }

        #bf-level5     { width: clamp(100px,14vw,180px); top:  4%; left:  2%; animation: bf1 22s ease-in-out infinite; }
        #bf-tapetech   { width: clamp(110px,15vw,190px); top:  5%; right: 2%; animation: bf2 28s ease-in-out infinite; }
        #bf-columbia   { width: clamp( 90px,12vw,160px); top: 35%; left:  1%; animation: bf3 20s ease-in-out infinite; }
        #bf-graco      { width: clamp(100px,13vw,170px); top: 35%; right: 1%; animation: bf4 25s ease-in-out infinite; }
        #bf-platinum   { width: clamp( 85px,11vw,150px); top: 65%; left:  3%; animation: bf5 18s ease-in-out infinite; }
        #bf-surpro     { width: clamp( 90px,12vw,155px); top: 65%; right: 3%; animation: bf6 23s ease-in-out infinite; }
        #bf-asgard     { width: clamp(160px,18vw,260px); top: 18%; left: 42%; animation: bf7 27s ease-in-out infinite; }
        #bf-durastilts { width: clamp(100px,13vw,175px); top: 50%; left: 38%; animation: bf8 24s ease-in-out infinite; }

        main {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3.75rem;
        }

        .content-block {
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            text-align: center;
            width: 100%;
        }

        .logo-container {
            margin-bottom: 3.25rem;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 340px;
            max-width: 80vw;
            height: auto;
            filter: drop-shadow(0 0 32px rgba(37,99,235,0.25));
        }

        h1 {
            font-size: clamp(2.25rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.04em;
            margin-bottom: 2.1rem;
            background: linear-gradient(180deg, #fff 0%, var(--dust-gray) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtext {
            font-size: clamp(0.9rem, 2vw, 1rem);
            color: var(--dust-gray);
            max-width: 540px;
            margin: 0 auto;
            line-height: 1.75;
            letter-spacing: 0.01em;
        }

        .signup-monolith {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(248, 250, 252, 0.08);
            padding: 2rem 2.25rem;
            border-radius: 6px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
            opacity: 0;
            transform: translateY(40px);
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            width: 100%;
            max-width: 520px;
        }

        .signup-monolith::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(37,99,235,0.7), transparent);
        }

        .signup-heading {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            margin-bottom: 1.2rem;
            line-height: 1.55;
            letter-spacing: 0.01em;
        }

        .sh-icon {
            flex-shrink: 0;
            margin-top: 1px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(37,99,235,0.12);
            border: 1px solid rgba(37,99,235,0.25);
            color: var(--brand-blue);
            animation: sh-ring 2.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .sh-text {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--dust-gray);
        }

        .sh-text em {
            font-style: normal;
            font-weight: 700;
            color: var(--gypsum-white);
            background: linear-gradient(90deg, #fff 0%, #93c5fd 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .sh-text em::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(37,99,235,0.6), rgba(147,197,253,0.4));
            transform: scaleX(0);
            transform-origin: left;
            animation: sh-underline 3s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .form-group {
            position: relative;
            margin-bottom: 0.75rem;
        }

        .field-label {
            display: block;
            margin-bottom: 0.45rem;
            color: rgba(203, 213, 225, 0.72);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.66rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .field-control {
            width: 100%;
            background: var(--field-bg);
            border: 1px solid var(--field-border);
            border-radius: 3px;
            padding: 0.875rem 1rem;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            line-height: 1.3;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .field-control::placeholder { color: rgba(148,163,184,0.55); }

        .field-control:focus {
            border-color: var(--field-border-focus);
            background: rgba(37, 99, 235, 0.06);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }

        select.field-control {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            padding-right: 2.5rem;
            background-image:
                linear-gradient(45deg, transparent 50%, rgba(203,213,225,.72) 50%),
                linear-gradient(135deg, rgba(203,213,225,.72) 50%, transparent 50%);
            background-position:
                calc(100% - 18px) 50%,
                calc(100% - 12px) 50%;
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
        }

        select.field-control option { color: #0f172a; background: #fff; }

        .referral-detail { display: none; }
        .referral-detail.is-visible { display: block; }

        button.submit-trigger {
            width: 100%;
            background: var(--brand-blue);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 0.9rem;
            font-weight: 700;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button.submit-trigger:hover:not(:disabled) {
            background: var(--brand-blue-strong);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
        }

        button.submit-trigger:active { transform: translateY(0); }
        button.submit-trigger:disabled { cursor: not-allowed; opacity: 0.78; }

        .form-note {
            margin: 0.75rem 0 0;
            color: rgba(148, 163, 184, 0.62);
            font-size: 0.72rem;
            line-height: 1.55;
            text-align: center;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        svg#grain-filter { position: absolute; width: 0; height: 0; }

        @keyframes reveal { to { opacity: 1; transform: translate(0); } }
        @keyframes sh-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
            45% { box-shadow: 0 0 0 5px rgba(37,99,235,0.18); }
            70% { box-shadow: 0 0 0 9px rgba(37,99,235,0); }
        }
        @keyframes sh-underline { to { transform: scaleX(1); } }
        @keyframes bf1 { 0%,100%{transform:translate(0,0) rotate(-3deg)} 50%{transform:translate(45px,-52px) rotate(1deg)} }
        @keyframes bf2 { 0%,100%{transform:translate(0,0) rotate(5deg)} 50%{transform:translate(-50px,42px) rotate(2deg)} }
        @keyframes bf3 { 0%,100%{transform:translate(0,0) rotate(-6deg)} 50%{transform:translate(55px,48px) rotate(-2deg)} }
        @keyframes bf4 { 0%,100%{transform:translate(0,0) rotate(2deg)} 50%{transform:translate(-42px,-46px) rotate(-1deg)} }
        @keyframes bf5 { 0%,100%{transform:translate(0,0) rotate(-4deg)} 50%{transform:translate(58px,-36px) rotate(0)} }
        @keyframes bf6 { 0%,100%{transform:translate(0,0) rotate(7deg)} 50%{transform:translate(-44px,50px) rotate(4deg)} }
        @keyframes bf7 { 0%,100%{transform:translate(0,0) rotate(-2deg)} 50%{transform:translate(-56px,-50px) rotate(1deg)} }
        @keyframes bf8 { 0%,100%{transform:translate(0,0) rotate(4deg)} 50%{transform:translate(42px,46px) rotate(1deg)} }

        @media (max-width: 600px) {
            body {
                padding: max(env(safe-area-inset-top, 0px), 3.5rem)
                         max(env(safe-area-inset-right, 0px), 1.25rem)
                         max(env(safe-area-inset-bottom, 0px), 3rem)
                         max(env(safe-area-inset-left, 0px), 1.25rem);
                align-items: center;
            }
            main { gap: 2.8rem; }
            .logo-img { width: 260px; }
            .logo-container { margin-bottom: 2.75rem; }
            h1 { font-size: clamp(1.875rem, 9vw, 2.5rem); margin-bottom: 1.65rem; line-height: 1.15; }
            .subtext { font-size: 0.9375rem; }
            .signup-monolith { padding: 2rem 1.45rem; max-width: 100%; }
            .signup-heading { margin-bottom: 1.2rem; }
            .sh-text { font-size: 0.875rem; }
            .sh-icon { width: 24px; height: 24px; }
            .form-group { margin-bottom: 0.875rem; }
            .field-control { padding: 0.9rem 1rem; font-size: 0.9375rem; }
            button.submit-trigger { padding: 0.9rem; }

            .brand-float { opacity: 0.04; }
            .brand-float--bkg { opacity: 0.08; }
            #bf-level5     { top:  2%; left: 1%; right: auto; width: 23vw; }
            #bf-columbia   { top: 12%; left: 0%; right: auto; width: 21vw; }
            #bf-asgard     { top: 22%; left: 1%; right: auto; width: 27vw; }
            #bf-platinum   { top: 33%; left: 1%; right: auto; width: 19vw; }
            #bf-tapetech   { top:  2%; right: 1%; left: auto; width: 25vw; }
            #bf-graco      { top: 12%; right: 0%; left: auto; width: 22vw; }
            #bf-durastilts { top: 22%; right: 0%; left: auto; width: 23vw; }
            #bf-surpro     { top: 33%; right: 1%; left: auto; width: 21vw; }
        }
    </style>
</head>
<body>
    <svg id="grain-filter" aria-hidden="true">
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>

    <div class="gypsum-grain" style="filter: url(#noise)" aria-hidden="true"></div>
    <div class="ambient-glow" aria-hidden="true"></div>
    <canvas id="dust-canvas" aria-hidden="true"></canvas>

    <div class="brand-float" id="bf-level5"><img src="https://drywalltoolbox.com/logos/Level5.svg" alt="" draggable="false"></div>
    <div class="brand-float" id="bf-tapetech"><img src="https://drywalltoolbox.com/logos/tapetech_logo.svg" alt="" draggable="false"></div>
    <div class="brand-float" id="bf-columbia"><img src="https://drywalltoolbox.com/logos/columbia_taping_tools_logo.svg" alt="" draggable="false"></div>
    <div class="brand-float" id="bf-graco"><img src="https://drywalltoolbox.com/logos/graco_logo.svg" alt="" draggable="false"></div>
    <div class="brand-float brand-float--white" id="bf-platinum"><img src="https://drywalltoolbox.com/logos/platinum_logo_white.svg" alt="" draggable="false"></div>
    <div class="brand-float" id="bf-surpro"><img src="https://drywalltoolbox.com/logos/surpro_logo.svg" alt="" draggable="false"></div>
    <div class="brand-float" id="bf-asgard"><img src="https://drywalltoolbox.com/logos/asgard_logo.svg" alt="" draggable="false"></div>
    <div class="brand-float brand-float--bkg" id="bf-durastilts"><img src="https://drywalltoolbox.com/logos/dura-stilts-logo.svg" alt="" draggable="false"></div>

    <main>
        <div class="content-block">
            <div class="logo-container">
                <img src="https://drywalltoolbox.com/logos/drywall-logo-white.png" alt="Drywall Toolbox" class="logo-img">
            </div>
            <h1>The New Standard<br>in Drywall.</h1>
            <p class="subtext">
                We're building a revolutionized online store that offers premium drywall tools, replacement parts, and professional repair services.
            </p>
        </div>

        <section class="signup-monolith" aria-labelledby="waitlist-heading">
            <div class="signup-heading" id="waitlist-heading">
                <span class="sh-icon" aria-hidden="true">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </span>
                <span class="sh-text">Be the <em>first to know</em> when we launch.</span>
            </div>

            <form id="waitlist-form" action="/wp-admin/admin-post.php" method="POST" novalidate>
                <input type="hidden" name="action" value="dtb_subscribe">
                <input type="hidden" name="_dtb_nonce" id="dtb_nonce_field" value="">
                <input type="hidden" name="dtb_page_referrer" id="dtb_page_referrer" value="">
                <input type="hidden" name="dtb_landing_url" id="dtb_landing_url" value="">
                <span class="sr-only" aria-hidden="true">
                    <label for="dtb_hp">Leave this field empty</label>
                    <input type="text" name="_dtb_hp" id="dtb_hp" value="" autocomplete="off" tabindex="-1">
                </span>

                <div class="form-group">
                    <label class="sr-only" for="email-input">Email address</label>
                    <input class="field-control" type="email" name="dtb_email" placeholder="Your Email Address" required id="email-input" autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="field-label" for="referral-source">How did you hear about us?</label>
                    <select class="field-control" name="dtb_referral_source" id="referral-source" required>
                        <option value="" selected disabled>Select one</option>
                        <option value="google">Google</option>
                        <option value="social_media">Social Media</option>
                        <option value="friend">Friend</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group referral-detail" id="referral-detail-group">
                    <label class="sr-only" for="referral-detail" id="referral-detail-label">Referral details</label>
                    <input class="field-control" type="text" name="dtb_referral_detail" id="referral-detail" maxlength="180" placeholder="Tell us more">
                </div>

                <button type="submit" class="submit-trigger">Sign Up</button>
                <p class="form-note">This helps us understand which channels are reaching professional drywall crews.</p>
            </form>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(248, 250, 252, ${this.opacity})`;
                ctx.beginPath();
                ctx.rect(this.x, this.y, this.size, this.size);
                ctx.fill();
            }
        }

        function initDust() {
            resize();
            particles = [];
            for (let i = 0; i < 120; i++) particles.push(new Particle());
            animateDust();
        }

        function animateDust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateDust);
        }

        window.addEventListener('resize', resize);
        initDust();

        var DTB_API = '/wp-json/dtb/v1';
        var form = document.getElementById('waitlist-form');
        var btn = form.querySelector('button');
        var input = document.getElementById('email-input');
        var referral = document.getElementById('referral-source');
        var detailGroup = document.getElementById('referral-detail-group');
        var detail = document.getElementById('referral-detail');
        var detailLabel = document.getElementById('referral-detail-label');
        var nonceField = document.getElementById('dtb_nonce_field');
        var honeypot = document.getElementById('dtb_hp');
        var referrerField = document.getElementById('dtb_page_referrer');
        var landingField = document.getElementById('dtb_landing_url');
        var detailPrompts = {
            social_media: {
                label: 'Social media platform',
                placeholder: 'Which platform? Instagram, TikTok, Facebook, YouTube, etc.'
            },
            friend: {
                label: 'Friend referral',
                placeholder: 'Who referred you?'
            },
            other: {
                label: 'Referral details',
                placeholder: 'Where did you hear about us?'
            }
        };

        referrerField.value = document.referrer || '';
        landingField.value = window.location.href;

        referral.addEventListener('change', function() {
            var prompt = detailPrompts[referral.value];
            var showDetail = Boolean(prompt);
            detailGroup.classList.toggle('is-visible', showDetail);
            detail.required = showDetail;
            detail.placeholder = prompt ? prompt.placeholder : 'Tell us more';
            detailLabel.textContent = prompt ? prompt.label : 'Referral details';
            if (!showDetail) detail.value = '';
            referral.style.borderColor = '';
            detail.style.borderColor = '';
        });

        (function(){
            fetch(DTB_API + '/subscribe-nonce', { credentials: 'same-origin' })
                .then(function(r){ return r.json(); })
                .then(function(d){ if (d && d.nonce) nonceField.value = d.nonce; })
                .catch(function(){});
        })();

        function setInvalid(el) {
            el.style.borderColor = '#ef4444';
            el.focus();
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            var email = input.value.trim();
            var source = referral.value;
            var sourceDetail = detail.value.trim();
            var requiresDetail = Boolean(detailPrompts[source]);

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                setInvalid(input);
                return;
            }
            if (!source) {
                setInvalid(referral);
                return;
            }
            if (requiresDetail && !sourceDetail) {
                setInvalid(detail);
                return;
            }

            input.style.borderColor = '';
            referral.style.borderColor = '';
            detail.style.borderColor = '';
            btn.innerHTML = 'Checking&hellip;';
            btn.disabled = true;

            try {
                var r = await fetch(DTB_API + '/subscribe', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        _dtb_hp: honeypot ? honeypot.value : '',
                        dtb_referral_source: source,
                        dtb_referral_detail: sourceDetail,
                        dtb_page_referrer: referrerField.value,
                        dtb_landing_url: landingField.value
                    })
                });
                var d = await r.json();
                if (r.ok && d.success) {
                    btn.innerHTML = 'You\'re In ✓';
                    btn.style.background = '#22c55e';
                    btn.style.color = 'white';
                    input.value = '';
                    input.placeholder = 'You\'re on the list.';
                    input.disabled = true;
                    referral.disabled = true;
                    detail.disabled = true;
                } else {
                    btn.innerHTML = 'Sign Up';
                    btn.disabled = false;
                    input.style.borderColor = '#ef4444';
                    input.placeholder = (d && (d.message || (d.data && d.data.message))) || 'Something went wrong. Try again.';
                    input.value = '';
                }
            } catch (_) {
                if (nonceField.value) {
                    form.submit();
                } else {
                    btn.innerHTML = 'Sign Up';
                    btn.disabled = false;
                    input.style.borderColor = '#ef4444';
                    input.placeholder = 'Network error. Please try again.';
                    input.value = '';
                }
            }
        });

        if (window.matchMedia('(pointer: fine) and (hover: hover)').matches) {
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 12;
                const y = (e.clientY / window.innerHeight - 0.5) * 12;
                document.querySelector('.signup-monolith').style.transform = `perspective(1000px) rotateX(${-y/2}deg) rotateY(${x/2}deg)`;
                document.querySelector('.content-block').style.transform = `translate3d(${x * -0.3}px, ${y * -0.3}px, 0)`;
            });
        }
    </script>
</body>
</html>
