<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drywall Toolbox | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --black-lighter: #0a0a0a;
            --blue: #2563eb;
            --blue-glow: rgba(37, 99, 235, 0.3);
            --white: #ffffff;
            --gray-light: #e5e7eb;
            --gray-dark: #374151;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Geist', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Background Effects */
        .background-glow {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, var(--blue-glow) 0%, transparent 70%);
            animation: glow-shift 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes glow-shift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 20px); }
        }

        main {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Main Container */
        .content-card {
            background: var(--black-lighter);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 8px;
            padding: 4rem 3rem;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Animated border glow */
        .content-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(37, 99, 235, 0.1), transparent);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        .content-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(37, 99, 235, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Logo Wrapper */
        .logo-wrapper {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .logo-wrapper svg {
            width: 340px;
            height: auto;
            filter: drop-shadow(0 0 30px var(--blue-glow));
            transition: filter 0.3s ease;
        }

        .logo-wrapper:hover svg {
            filter: drop-shadow(0 0 40px rgba(37, 99, 235, 0.5));
        }

        /* Typography */
        .tagline {
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 1rem;
            opacity: 0.9;
            font-weight: 500;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
        }

        p.description {
            font-size: 1.2rem;
            line-height: 1.7;
            color: var(--gray-light);
            max-width: 500px;
            margin: 0 auto 2.5rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            position: relative;
            z-index: 1;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Form Styling */
        .email-form {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(37, 99, 235, 0.3);
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        .email-form:focus-within {
            border-color: var(--blue);
            box-shadow: 0 0 30px var(--blue-glow);
        }

        .email-input {
            background: transparent;
            border: none;
            padding: 0.875rem 1.25rem;
            color: var(--white);
            font-family: 'Geist', sans-serif;
            flex-grow: 1;
            font-size: 0.95rem;
            outline: none;
        }

        .email-input::placeholder {
            color: var(--gray-dark);
        }

        .submit-btn {
            background: var(--blue);
            color: var(--white);
            border: none;
            padding: 0.875rem 1.75rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .submit-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Status Info */
        .status-info {
            position: relative;
            z-index: 1;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(37, 99, 235, 0.2);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gray-dark);
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--blue);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--blue);
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            main {
                padding: 1.5rem;
            }

            .content-card {
                padding: 3rem 2rem;
            }

            .logo-wrapper svg {
                width: 280px;
            }

            .email-form {
                flex-direction: column;
            }

            .submit-btn {
                justify-content: center;
            }
        }

        @media (max-width: 640px) {
            .content-card {
                padding: 2rem 1.5rem;
            }

            .logo-wrapper svg {
                width: 240px;
            }

            p.description {
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }

            .status-info {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

            <p class="description">
                Sign up and be the first to know when we launch.
            </p>

            <form class="email-form" id="signupForm">
                <input type="email" class="email-input" placeholder="Enter professional email" required>
                <button type="submit" class="submit-btn">
                    Notify Me
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <div class="status-info">
                <span class="status-dot"></span>Status: Launching Soon
            </div>
        </div>
    </main>

    <script>
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.submit-btn');
            const input = e.target.querySelector('.email-input');
            
            btn.innerHTML = 'Secured ✓';
            btn.style.background = '#1d4ed8';
            input.value = '';
            input.placeholder = 'You are on the list.';
            input.disabled = true;
        });

        // Subtle parallax effect on scroll
        window.addEventListener('scroll', () => {
            const card = document.querySelector('.content-card');
            const scrollY = window.scrollY;
            card.style.transform = `translateY(${scrollY * 0.3}px)`;
        });
    </script>

</html>
