<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Drywall Toolbox | Precision Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gypsum-white: #f8fafc;
            --dust-gray: #94a3b8;
            --brand-blue: #2563eb;
            --deep-slate: #020617;
            --surface-matte: rgba(15, 23, 42, 0.8);
            --border-chalk: rgba(248, 250, 252, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-slate);
            color: var(--gypsum-white);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(env(safe-area-inset-top, 0px), 2.5rem)
                     max(env(safe-area-inset-right, 0px), 1.5rem)
                     max(env(safe-area-inset-bottom, 0px), 2.5rem)
                     max(env(safe-area-inset-left, 0px), 1.5rem);
        }

        /* ── GRANULAR TEXTURE ENGINE ── */
        .gypsum-grain {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.4;
            mix-blend-mode: overlay;
        }

        /* ── DUST PARTICLE CANVAS ── */
        #dust-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* ── MUDDING GRADIENTS ── */
        .ambient-glow {
            position: fixed;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle at 50% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 70%);
            z-index: 2;
            filter: blur(100px);
            pointer-events: none;
        }

        /* ── MAIN ARCHITECTURE ── */
        /* Single centered column on both desktop and mobile */
        main {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
        }

        /* ── CONTENT BLOCK ── */
        .content-block {
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            text-align: center;
            width: 100%;
        }

        .logo-container {
            margin-bottom: 3.5rem;
            display: flex;
            justify-content: center;
        }

        /* Desktop: large prominent logo */
        .logo-img {
            width: 340px;
            max-width: 80vw;
            height: auto;
            filter: drop-shadow(0 0 32px rgba(37,99,235,0.25));
        }

        h1 {
            font-size: clamp(2.25rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.04em;
            margin-bottom: 2.25rem;
            background: linear-gradient(180deg, #fff 0%, var(--dust-gray) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtext {
            font-size: clamp(0.9rem, 2vw, 1rem);
            color: var(--dust-gray);
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.75;
            letter-spacing: 0.01em;
        }

        /* ── THE "TOOLBOX" FORM ── */
        .signup-monolith {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(248, 250, 252, 0.08);
            padding: 2rem 2.25rem;
            border-radius: 6px;
            backdrop-filter: blur(24px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
            opacity: 0;
            transform: translateY(40px);
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            width: 100%;
            max-width: 480px;
        }

        .signup-monolith::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(37,99,235,0.7), transparent);
        }

        .status-header { display: none; }
        .status-pulse  { display: none; }

        .signup-heading {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            margin-bottom: 1.25rem;
            line-height: 1.55;
            letter-spacing: 0.01em;
        }

        .sh-icon {
            flex-shrink: 0;
            margin-top: 1px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(37,99,235,0.12);
            border: 1px solid rgba(37,99,235,0.25);
            color: var(--brand-blue);
            animation: sh-ring 2.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes sh-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0); }
            45%       { box-shadow: 0 0 0 5px rgba(37,99,235,0.18); }
            70%       { box-shadow: 0 0 0 9px rgba(37,99,235,0); }
        }

        .sh-text {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--dust-gray);
        }

        .sh-text em {
            font-style: normal;
            font-weight: 600;
            color: var(--gypsum-white);
            background: linear-gradient(90deg, #fff 0%, #93c5fd 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .sh-text em::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(37,99,235,0.6), rgba(147,197,253,0.4));
            transform: scaleX(0);
            transform-origin: left;
            animation: sh-underline 3s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes sh-underline {
            to { transform: scaleX(1); }
        }

        .form-group {
            position: relative;
            margin-bottom: 0.75rem;
        }

        input[type="email"] {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(248,250,252,0.12);
            border-radius: 3px;
            padding: 0.875rem 1rem;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        input[type="email"]::placeholder {
            color: rgba(148,163,184,0.55);
        }

        input[type="email"]:focus {
            border-color: rgba(37,99,235,0.6);
            background: rgba(37, 99, 235, 0.06);
        }

        button.submit-trigger {
            width: 100%;
            background: var(--brand-blue);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 0.875rem;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button.submit-trigger:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
        }

        button.submit-trigger:active {
            transform: translateY(0);
        }

        .specs { display: none; }

        /* ── MOBILE OVERRIDES (≤ 600px) ── */
        @media (max-width: 600px) {
            body {
                padding: max(env(safe-area-inset-top, 0px), 3.5rem)
                         max(env(safe-area-inset-right, 0px), 1.25rem)
                         max(env(safe-area-inset-bottom, 0px), 3rem)
                         max(env(safe-area-inset-left, 0px), 1.25rem);
                align-items: center;
            }
            main { gap: 3rem; }
            .logo-img { width: 260px; }
            .logo-container { margin-bottom: 2.75rem; margin-top: 0; }
            h1 { font-size: clamp(1.875rem, 9vw, 2.5rem); margin-bottom: 1.75rem; line-height: 1.15; }
            .subtext { font-size: 0.9375rem; }
            .signup-monolith { padding: 2rem 1.5rem; max-width: 100%; }
            .signup-heading { margin-bottom: 1.25rem; }
            .sh-text { font-size: 0.875rem; }
            .sh-icon { width: 24px; height: 24px; }
            .form-group { margin-bottom: 0.875rem; }
            input[type="email"] { padding: 0.9rem 1rem; font-size: 0.9375rem; }
            button.submit-trigger { padding: 0.9rem; }
        }

        /* ── ANIMATIONS ── */
        @keyframes reveal {
            to { opacity: 1; transform: translate(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ── CUSTOM GRAIN FILTER ── */
        svg#grain-filter {
            position: absolute; width: 0; height: 0;
        }

        /* ── FLOATING BRAND LOGOS ── */
        /* Default: dark-path logos on transparent bg — invert to white */
        .brand-float {
            position: fixed;
            pointer-events: none;
            user-select: none;
            z-index: 3;
            opacity: 0.055;
            filter: invert(1) grayscale(1);
            will-change: transform;
        }

        /* White-path logos (Platinum) — no invert needed */
        .brand-float--white {
            filter: grayscale(1);
        }

        /* Dura-Stilts — now has transparent bg with yellow paths + dark counters.
           No blend-mode needed; treat like any other dark-bg-free logo. */
        .brand-float--bkg {
            filter: grayscale(1) sepia(1) hue-rotate(180deg) brightness(1.6);
            opacity: 0.07;
        }

        .brand-float img { display: block; width: 100%; height: auto; }

        /* Each logo drifts on a unique path — durations 18-28s, ±40-60px travel */
        @keyframes bf1 {
            0%   { transform: translate(0px,   0px)  rotate(-3deg); }
            30%  { transform: translate(45px, -52px)  rotate(1deg);  }
            65%  { transform: translate(-30px, 38px)  rotate(-1deg); }
            100% { transform: translate(0px,   0px)  rotate(-3deg); }
        }
        @keyframes bf2 {
            0%   { transform: translate(0px,  0px) rotate(5deg);  }
            40%  { transform: translate(-50px, 42px) rotate(2deg);  }
            75%  { transform: translate(38px, -28px) rotate(6deg);  }
            100% { transform: translate(0px,  0px) rotate(5deg);  }
        }
        @keyframes bf3 {
            0%   { transform: translate(0px,  0px) rotate(-6deg); }
            50%  { transform: translate(55px, 48px) rotate(-2deg); }
            100% { transform: translate(0px,  0px) rotate(-6deg); }
        }
        @keyframes bf4 {
            0%   { transform: translate(0px,   0px)  rotate(2deg);  }
            35%  { transform: translate(-42px, -46px) rotate(-1deg); }
            70%  { transform: translate(28px,  55px)  rotate(3deg);  }
            100% { transform: translate(0px,   0px)  rotate(2deg);  }
        }
        @keyframes bf5 {
            0%   { transform: translate(0px,   0px)  rotate(-4deg); }
            45%  { transform: translate(58px, -36px)  rotate(0deg);  }
            100% { transform: translate(0px,   0px)  rotate(-4deg); }
        }
        @keyframes bf6 {
            0%   { transform: translate(0px,   0px)  rotate(7deg);  }
            30%  { transform: translate(-44px, 50px)  rotate(4deg);  }
            65%  { transform: translate(32px, -40px)  rotate(8deg);  }
            100% { transform: translate(0px,   0px)  rotate(7deg);  }
        }
        @keyframes bf7 {
            0%   { transform: translate(0px,   0px)  rotate(-2deg); }
            55%  { transform: translate(-56px, -50px) rotate(1deg);  }
            100% { transform: translate(0px,   0px)  rotate(-2deg); }
        }
        @keyframes bf8 {
            0%   { transform: translate(0px,  0px) rotate(4deg);  }
            40%  { transform: translate(42px, 46px) rotate(1deg);  }
            80%  { transform: translate(-28px,-34px) rotate(5deg);  }
            100% { transform: translate(0px,  0px) rotate(4deg);  }
        }

        /* Desktop positions — spread across full viewport */
        #bf-level5    { width: clamp(100px,14vw,180px); top:  4%;  left:  2%;  animation: bf1 22s ease-in-out infinite; }
        #bf-tapetech  { width: clamp(110px,15vw,190px); top:  5%;  right: 2%;  animation: bf2 28s ease-in-out infinite; }
        #bf-columbia  { width: clamp( 90px,12vw,160px); top: 35%;  left:  1%;  animation: bf3 20s ease-in-out infinite; }
        #bf-graco     { width: clamp(100px,13vw,170px); top: 35%;  right: 1%;  animation: bf4 25s ease-in-out infinite; }
        #bf-platinum  { width: clamp( 85px,11vw,150px); top: 65%;  left:  3%;  animation: bf5 18s ease-in-out infinite; }
        #bf-surpro    { width: clamp( 90px,12vw,155px); top: 65%;  right: 3%;  animation: bf6 23s ease-in-out infinite; }
        #bf-asgard    { width: clamp(160px,18vw,260px); top: 18%;  left: 42%;  animation: bf7 27s ease-in-out infinite; }
        #bf-durastilts{ width: clamp(100px,13vw,175px); top: 50%;  left: 38%;  animation: bf8 24s ease-in-out infinite; }

        /* ── MOBILE DRIFT KEYFRAMES (±12px max — prevents off-screen overflow) ── */
        @keyframes bf1m { 0%,100%{transform:translate(  0px,  0px) rotate(-2deg)} 50%{transform:translate( 12px,-10px) rotate( 1deg)} }
        @keyframes bf2m { 0%,100%{transform:translate(  0px,  0px) rotate( 3deg)} 50%{transform:translate(-10px, 12px) rotate( 5deg)} }
        @keyframes bf3m { 0%,100%{transform:translate(  0px,  0px) rotate(-4deg)} 50%{transform:translate(  8px, 10px) rotate(-1deg)} }
        @keyframes bf4m { 0%,100%{transform:translate(  0px,  0px) rotate( 2deg)} 50%{transform:translate(-12px, -8px) rotate(-1deg)} }
        @keyframes bf5m { 0%,100%{transform:translate(  0px,  0px) rotate(-3deg)} 50%{transform:translate( 10px,-12px) rotate( 0deg)} }
        @keyframes bf6m { 0%,100%{transform:translate(  0px,  0px) rotate( 5deg)} 50%{transform:translate( -8px, 10px) rotate( 7deg)} }
        @keyframes bf7m { 0%,100%{transform:translate(  0px,  0px) rotate(-1deg)} 50%{transform:translate(-10px,-10px) rotate( 1deg)} }
        @keyframes bf8m { 0%,100%{transform:translate(  0px,  0px) rotate( 3deg)} 50%{transform:translate( 10px,  8px) rotate( 5deg)} }

        /* ── MOBILE LAYOUT ≤600px ──
           Two columns (left/right), 4 logos each, all within top 36% of screen.
           vw widths scale proportionally to any screen size.
           Logos stay off-screen edge; ±12px drift can't push them fully out of view. */
        @media (max-width: 600px) {
            .brand-float      { opacity: 0.04; }
            .brand-float--bkg { opacity: 0.08; }

            /* ── Left column ── */
            #bf-level5    { top:  2%; left: 1%; right: auto; width: 23vw; animation: bf1m 20s ease-in-out infinite; }
            #bf-columbia  { top: 12%; left: 0%; right: auto; width: 21vw; animation: bf3m 18s ease-in-out infinite; }
            #bf-asgard    { top: 22%; left: 1%; right: auto; width: 27vw; animation: bf7m 25s ease-in-out infinite; }
            #bf-platinum  { top: 33%; left: 1%; right: auto; width: 19vw; animation: bf5m 16s ease-in-out infinite; }

            /* ── Right column ── */
            #bf-tapetech  { top:  2%; right: 1%; left: auto; width: 25vw; animation: bf2m 22s ease-in-out infinite; }
            #bf-graco     { top: 12%; right: 0%; left: auto; width: 22vw; animation: bf4m 20s ease-in-out infinite; }
            #bf-durastilts{ top: 22%; right: 0%; left: auto; width: 23vw; animation: bf8m 23s ease-in-out infinite; }
            #bf-surpro    { top: 33%; right: 1%; left: auto; width: 21vw; animation: bf6m 17s ease-in-out infinite; }
        }
    </style>
</head>
<body>

    <!-- SVG Texture Core -->
    <svg id="grain-filter">
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>

    <div class="gypsum-grain" style="filter: url(#noise)"></div>
    <div class="ambient-glow"></div>
    <canvas id="dust-canvas"></canvas>

    <!-- Floating brand logos background -->
    <div class="brand-float" id="bf-level5">
        <img src="https://drywalltoolbox.com/logos/Level5.svg" alt="" draggable="false">
    </div>
    <div class="brand-float" id="bf-tapetech">
        <img src="https://drywalltoolbox.com/logos/tapetech_logo.svg" alt="" draggable="false">
    </div>
    <div class="brand-float" id="bf-columbia">
        <img src="https://drywalltoolbox.com/logos/columbia_taping_tools_logo.svg" alt="" draggable="false">
    </div>
    <div class="brand-float" id="bf-graco">
        <img src="https://drywalltoolbox.com/logos/graco_logo.svg" alt="" draggable="false">
    </div>
    <div class="brand-float brand-float--white" id="bf-platinum">
        <img src="https://drywalltoolbox.com/logos/platinum_logo_white.svg" alt="" draggable="false">
    </div>
    <div class="brand-float" id="bf-surpro">
        <img src="https://drywalltoolbox.com/logos/surpro_logo.svg" alt="" draggable="false">
    </div>
    <div class="brand-float" id="bf-asgard">
        <img src="https://drywalltoolbox.com/logos/asgard_logo.svg" alt="" draggable="false">
    </div>
    <div class="brand-float brand-float--bkg" id="bf-durastilts">
        <img src="https://drywalltoolbox.com/logos/dura-stilts-logo.svg" alt="" draggable="false">
    </div>

    <main>
        <div class="content-block">
            <div class="logo-container">
                <img src="https://drywalltoolbox.com/logos/drywall-logo-white.png" alt="Drywall Toolbox" class="logo-img">
            </div>
            <h1>The New Standard<br>in Drywall.</h1>
            <p class="subtext">
                We're building a revolutionized online store that offers premium drywall tools, replacement parts, and professional repair services.
            </p>
        </div>

        <section class="signup-monolith">
            <div class="signup-heading">
                <span class="sh-icon" aria-hidden="true">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </span>
                <span class="sh-text">Be the <em>first to know</em> when we launch.</span>
            </div>

            <form id="waitlist-form" action="/wp-admin/admin-post.php" method="POST" novalidate>
                <input type="hidden" name="action"     value="dtb_subscribe">
                <input type="hidden" name="_dtb_nonce" id="dtb_nonce_field" value="">
                <span style="position:absolute;left:-9999px;opacity:0;pointer-events:none;" aria-hidden="true">
                    <input type="text" name="_dtb_hp" id="dtb_hp" value="" autocomplete="off" tabindex="-1">
                </span>
                <div class="form-group">
                    <input type="email" name="dtb_email" placeholder="Your Email Address" required id="email-input" autocomplete="email">
                </div>
                <button type="submit" class="submit-trigger">
                    Sign Up
                </button>
            </form>
        </section>
    </main>

    <script>
        // ── DUST PARTICLES (GYPSUM PARTICULATE) ──
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(248, 250, 252, ${this.opacity})`;
                // Drawing irregular "dust" shapes instead of perfect circles
                ctx.beginPath();
                ctx.rect(this.x, this.y, this.size, this.size);
                ctx.fill();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < 120; i++) {
                particles.push(new Particle());
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();

        // ── FORM — WordPress REST API (same backend as coming-soon.html) ──
        var DTB_API = '/wp-json/dtb/v1';
        var form       = document.getElementById('waitlist-form');
        var btn        = form.querySelector('button');
        var input      = document.getElementById('email-input');
        var nonceField = document.getElementById('dtb_nonce_field');
        var honeypot   = document.getElementById('dtb_hp');

        // Prefetch nonce into the hidden form field
        (function(){
            fetch(DTB_API + '/subscribe-nonce', { credentials: 'same-origin' })
                .then(function(r){ return r.json(); })
                .then(function(d){ if (d && d.nonce) nonceField.value = d.nonce; })
                .catch(function(){});
        })();

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            var email = input.value.trim();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                input.style.borderColor = '#ef4444';
                input.focus();
                return;
            }
            input.style.borderColor = '';
            btn.innerHTML = 'Checking&hellip;';
            btn.disabled = true;
            try {
                var r = await fetch(DTB_API + '/subscribe', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, _dtb_hp: honeypot ? honeypot.value : '' })
                });
                var d = await r.json();
                if (r.ok && d.success) {
                    btn.innerHTML = 'You\'re In ✓';
                    btn.style.background = '#22c55e';
                    btn.style.color = 'white';
                    input.value = '';
                    input.placeholder = "You're on the list.";
                    input.disabled = true;
                } else {
                    btn.innerHTML = 'Sign Up';
                    btn.disabled = false;
                    input.style.borderColor = '#ef4444';
                    input.placeholder = (d && (d.message || (d.data && d.data.message))) || 'Something went wrong. Try again.';
                    input.value = '';
                }
            } catch (_) {
                // Network fallback: traditional form POST (nonce already in hidden field)
                if (nonceField.value) {
                    form.submit();
                } else {
                    btn.innerHTML = 'Sign Up';
                    btn.disabled = false;
                    input.style.borderColor = '#ef4444';
                    input.placeholder = 'Network error. Please try again.';
                    input.value = '';
                }
            }
        });

        // ── PARALLAX MOUSE EFFECT (pointer devices only) ──
        if (window.matchMedia('(pointer: fine) and (hover: hover)').matches) {
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 12;
                const y = (e.clientY / window.innerHeight - 0.5) * 12;
                document.querySelector('.signup-monolith').style.transform = `perspective(1000px) rotateX(${-y/2}deg) rotateY(${x/2}deg)`;
                document.querySelector('.content-block').style.transform = `translate3d(${x * -0.3}px, ${y * -0.3}px, 0)`;
            });
        }
    </script>
</body>
