<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="<%= htmlWebpackPlugin.options.publicPath %>favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="<%= htmlWebpackPlugin.options.publicPath %>favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="<%= htmlWebpackPlugin.options.publicPath %>favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="<%= htmlWebpackPlugin.options.publicPath %>favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="<%= htmlWebpackPlugin.options.publicPath %>favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="<%= htmlWebpackPlugin.options.publicPath %>apple-touch-icon.png" />
    <link rel="manifest" href="<%= htmlWebpackPlugin.options.publicPath %>site.webmanifest" />
    <!--
      viewport-fit=cover: lets content extend into iPhone notch/dynamic-island safe areas.
      user-scalable=yes + maximum-scale=5: allows pinch-zoom (WCAG 1.4.4) and keeps
      Android Chrome's fast-tap scroll path active. iOS Safari auto-zoom on inputs is
      prevented via font-size:16px in CSS — no need to lock the viewport.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Static default SEO (overridden per-page by SEOHead / react-helmet-async) ── -->
    <title>Drywall Toolbox - Professional Tools &amp; Equipment</title>
    <meta name="description" content="Professional drywall tools and equipment from top brands. Shop automatic taping tools, mud boxes, finishing tools, and more at unbeatable prices.">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="https://drywalltoolbox.com/">

    <!-- Open Graph defaults -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="Drywall Toolbox">
    <meta property="og:title"       content="Drywall Toolbox - Professional Tools &amp; Equipment">
    <meta property="og:description" content="Professional drywall tools and equipment from top brands. Shop automatic taping tools, mud boxes, finishing tools, and more at unbeatable prices.">
    <meta property="og:url"         content="https://drywalltoolbox.com/">
    <meta property="og:image"       content="https://drywalltoolbox.com/logo-black.svg">
    <meta property="og:image:alt"   content="Drywall Toolbox">

    <!-- Twitter Card defaults -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="Drywall Toolbox - Professional Tools &amp; Equipment">
    <meta name="twitter:description" content="Professional drywall tools and equipment from top brands. Shop automatic taping tools, mud boxes, finishing tools, and more at unbeatable prices.">
    <meta name="twitter:image"       content="https://drywalltoolbox.com/logo-black.svg">
    <meta name="twitter:image:alt"   content="Drywall Toolbox">

    <meta name="keywords" content="drywall tools, taping tools, finishing tools, construction equipment, TapeTech, Level5">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Drywall Toolbox">

    <!-- Establish connections to font servers as early as possible -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Early connection to the production API / WP backend -->
    <link rel="preconnect" href="https://drywalltoolbox.com" crossorigin>
    <!--
      Non-render-blocking Google Fonts load (preload + onload swap).
      font-display=swap: browser immediately renders text in a fallback font and
      swaps in Geist/JetBrains Mono once downloaded — eliminates FOIT (invisible
      text) and prevents layout-blocking on slow mobile connections.
      Geist: Vercel's modern geometric sans-serif. Full variable axis (100–900).
      JetBrains Mono: monospace for SKUs, codes, and inline kbd hints.
      The preload/onload pattern prevents the stylesheet from blocking the
      initial render; the <noscript> fallback ensures fonts still load when
      JavaScript is disabled.
    -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=JetBrains+Mono:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=JetBrains+Mono:wght@400;700&display=swap"></noscript>

    <!-- Static Organization JSON-LD (supplements per-page dynamic schemas) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Drywall Toolbox",
      "url": "https://drywalltoolbox.com",
      "logo": "https://drywalltoolbox.com/logo-black.svg",
      "description": "Professional drywall tools and equipment from top brands. Shop automatic taping tools, mud boxes, finishing tools, and more.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "support@drywalltoolbox.com",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://www.facebook.com/drywalltoolbox",
        "https://www.instagram.com/drywalltoolbox"
      ]
    }
    </script>
  </head>
  <body>
    <!--
      GitHub Pages SPA deep-link restore.
      404.html encodes the original path into ?/path — this script decodes it
      back and replaces the browser URL *before* React/ReactRouter boots so the
      router sees the real path (e.g. /login, /register) rather than /?/login.
    -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
      // Also handle the ?/ encoding used by 404.html
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          var pathWithoutTrailingSlash = l.pathname.endsWith('/') ? l.pathname.slice(0, -1) : l.pathname;
          window.history.replaceState(
            null, null,
            pathWithoutTrailingSlash + decoded[0] +
            (decoded.slice(1).length ? '?' + decoded.slice(1).join('&') : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <!--
      WooCommerce core-profiler safety guard
      ──────────────────────────────────────
      WooCommerce 7+ ships a React-based admin app (core-profiler.js) that can
      execute on any page where WordPress injects its scripts. If that bundle
      runs before its data is ready it throws:
        "Uncaught TypeError: Cannot read properties of undefined (reading 'title')"
      The primary fix is the dtb-disable-wc-admin.php mu-plugin (server-side).
      This inline script is a belt-and-suspenders guard: it pre-seeds the global
      objects the component reads so that, if the bundle does execute, it finds
      valid data instead of undefined and does not crash.
    -->
    <script>
      (function () {
        if (!window.wcAdmin) window.wcAdmin = {};
        if (!window.wcAdmin.profile) {
          window.wcAdmin.profile = {
            title: '',
            industries: [],
            products: [],
            business_extensions: [],
            completed: true,
            skipped: true
          };
        }
        if (!window.wcSettings) window.wcSettings = {};
        if (!window.wcSettings.admin) {
          window.wcSettings.admin = { defaultDateRange: 'period=month&compare=previous_year' };
        }
      })();
    </script>
    <div id="root"></div>
    <!-- webpack HtmlWebpackPlugin injects the bundle script automatically -->
  </body>
</html>
