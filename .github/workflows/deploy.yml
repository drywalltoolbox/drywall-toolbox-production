name: Deploy to HostGator

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Deploy to the domain root — no subdirectory prefix needed
          PUBLIC_URL: ''
          # WordPress & WooCommerce API credentials (injected from GitHub Actions secrets)
          REACT_APP_WP_BASE_URL:        ${{ secrets.REACT_APP_WP_BASE_URL }}
          REACT_APP_WC_CONSUMER_KEY:    ${{ secrets.REACT_APP_WC_CONSUMER_KEY }}
          REACT_APP_WC_CONSUMER_SECRET: ${{ secrets.REACT_APP_WC_CONSUMER_SECRET }}
          # Keep legacy VITE_ vars populated so the WooCommerce settings UI still works
          VITE_WOOCOMMERCE_STORE_URL:        ${{ secrets.REACT_APP_WP_BASE_URL }}
          VITE_WOOCOMMERCE_CONSUMER_KEY:     ${{ secrets.REACT_APP_WC_CONSUMER_KEY }}
          VITE_WOOCOMMERCE_CONSUMER_SECRET:  ${{ secrets.REACT_APP_WC_CONSUMER_SECRET }}

      # Deploy the compiled React app to /public_html/ on HostGator.
      # The /wp/ subdirectory (WordPress) lives on the server and must never
      # be overwritten by FTP — it is excluded via the `exclude` list below.
      # Docs: https://github.com/SamKirkland/FTP-Deploy-Action
      - name: Deploy to HostGator via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          local-dir:  ./dist/
          server-dir: /public_html/
          # Prevent the FTP action from deleting or overwriting the WordPress
          # installation that lives in /public_html/wp/ on the server.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            wp/**

