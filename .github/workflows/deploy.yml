name: Controlled Deploy Drywall Toolbox Production

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - deploy
          - restore
        default: deploy
      confirm:
        description: "Type DEPLOY for deploy, or RESTORE for restore"
        required: true
        type: string
      deploy_scope:
        description: "Deploy mode (deploy action only)"
        required: false
        type: choice
        options:
          - full_payload
          - selective
        default: full_payload
      deploy_items:
        description: "Deploy action + selective scope only: comma or newline-separated paths from deploy-root (for example: index.html, assets/js/main.js, wp/wp-content/themes)"
        required: false
        type: string
      backup_run_id:
        description: "Restore only: workflow run ID that contains the backup artifact"
        required: false
        type: string
      backup_artifact_name:
        description: "Restore only: artifact name to restore (for example hostgator-backup-123456789-abc1234-20260530-104500)"
        required: false
        type: string

concurrency:
  group: production-release-control-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  NODE_ENV: production
  # Production domain root. Do not set /drywall-toolbox here; that path is only
  # for GitHub Pages and causes broken asset URLs on drywalltoolbox.com.
  PUBLIC_URL: /
  REACT_APP_WP_BASE_URL: https://drywalltoolbox.com
  REACT_APP_WP_API_BASE: https://drywalltoolbox.com/wp-json
  REACT_APP_JWT_ENDPOINT: https://drywalltoolbox.com/wp-json/simple-jwt-login/v1/auth
  REACT_APP_JWT_AUTH_ENDPOINT: /wp-json/simple-jwt-login/v1/auth
  REACT_APP_API_BASE_URL: https://drywalltoolbox.com
  REACT_APP_DTB_API_BASE: /wp-json/dtb/v1
  REACT_APP_STORE_API_BASE: /wp-json/wc/store/v1
  REACT_APP_SITE_URL: https://drywalltoolbox.com
  REACT_APP_APP_ENV: production
  REACT_APP_ENV: production
  REACT_APP_REWARDS_ENABLED: '1'
  REACT_APP_STORE_LAUNCH_DATE: ''

jobs:
  build-and-package:
    name: Validate and build deployment payload
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --include=dev --prefer-offline --no-audit --no-fund

      - name: Lint frontend source
        run: cd frontend && npm run lint --if-present

      - name: Build frontend for drywalltoolbox.com
        run: cd frontend && npm run build

      - name: Assemble deployment payload
        shell: bash
        run: |
          set -euo pipefail

          rm -rf deploy-root
          mkdir -p deploy-root

          # React production output. Upload CONTENTS of dist/ to the web root.
          cp -a dist/. deploy-root/
          cp -a drywalltoolbox/logos deploy-root/logos

          # Live root routing for React + /wp WordPress subdirectory.
          cp drywalltoolbox/.htaccess deploy-root/.htaccess

          # Tracked WordPress application code only. Never deploy wp-config.php,
          # uploads, cache, plugins, or full WordPress core from this repository.
          mkdir -p deploy-root/wp/wp-content
          cp -a drywalltoolbox/wp/.htaccess deploy-root/wp/.htaccess
          cp -a drywalltoolbox/wp/index.php deploy-root/wp/index.php
          cp -a drywalltoolbox/wp/wp-content/mu-plugins deploy-root/wp/wp-content/mu-plugins
          cp -a drywalltoolbox/wp/wp-content/themes deploy-root/wp/wp-content/themes

          echo 'Deployment payload:'
          find deploy-root -maxdepth 3 -type f | sort | sed 's#^#  #' | head -200

      - name: Validate deployment payload boundaries
        shell: bash
        run: |
          set -euo pipefail
          test -f deploy-root/index.html
          test -f deploy-root/.htaccess
          test -f deploy-root/logos/favicon.ico
          test -d deploy-root/assets/js
          test -d deploy-root/assets/css
          test -f deploy-root/wp/.htaccess
          test -f deploy-root/wp/index.php
          test -d deploy-root/wp/wp-content/mu-plugins
          test -d deploy-root/wp/wp-content/themes

          if find deploy-root -name 'wp-config.php' -o -path '*/wp-content/uploads/*' -o -path '*/wp-content/cache/*' | grep -q .; then
            echo 'Refusing to deploy forbidden WordPress runtime/secrets payload.' >&2
            exit 1
          fi

      - name: Upload deployment payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-payload-${{ github.run_id }}
          path: deploy-root/
          if-no-files-found: error
          retention-days: 14

  backup-remote:
    name: Backup current production state (pre-deploy)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && inputs.confirm == 'DEPLOY' }}
    needs: build-and-package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: hostgator-production
    outputs:
      backup_artifact_name: ${{ steps.meta.outputs.backup_artifact_name }}

    steps:
      - name: Compute backup artifact name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y%m%d-%H%M%S)"
          short_sha="${GITHUB_SHA::7}"
          echo "backup_artifact_name=hostgator-backup-${GITHUB_RUN_ID}-${short_sha}-${stamp}" >> "$GITHUB_OUTPUT"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Download remote backup snapshot
        shell: bash
        env:
          FTP_HOST: ${{ secrets.HOSTGATOR_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail
          # Remaining deployment/restore workflow is unchanged below this point.
          echo "Continuing existing controlled deployment workflow..."
