name: Deploy WordPress Theme & Plugin to HostGator

on:
  push:
    branches:
      - main
    paths:
      - 'wp-content/themes/**'
      - 'wp-content/plugins/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy to HostGator
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy themes and plugins via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTGATOR_FTP_HOST }}
          username: ${{ secrets.HOSTGATOR_FTP_USER }}
          password: ${{ secrets.HOSTGATOR_FTP_PASS }}
          protocol: ftps
          port: 21
          server-dir: /public_html/website_a246e6a8/wp-content/
          local-dir: ./wp-content/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.log
            **/.env*
            **/.gitignore
            **/README.md
            **/twentytwenty*/**
            **/yith-wonder/**
            **/*.bak
          dangerous-clean-slate: false
          log-level: verbose
          dry-run: false
          timeout: 60000

      - name: Deployment complete
        if: always()
        run: echo "✓ Deployed to HostGator at $(date)"