name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend (webpack → ../dist/)
        run: cd frontend && npm run build
        env:
          NODE_ENV: production
          # GitHub Pages sub-path (repo name); adjust if the Pages site uses a custom domain
          PUBLIC_URL: /drywall-toolbox
          # ── GitHub Pages: use bundled CSV only (remote CSV returns 403) ─────
          # Server blocks cross-origin fetches — leave blank so catalog.js
          # skips the remote attempt and goes straight to the bundled file.
          REACT_APP_WC_CSV_URL: ''
          # Keep local CSV bundled as fallback
          REACT_APP_USE_LOCAL_CSV: 'true'
          # ── Stub out WP/WC endpoints (not available on GH Pages) ─────────────
          REACT_APP_WP_BASE_URL: ''
          REACT_APP_WC_BASE_URL: ''
          REACT_APP_WC_AUTH_USER: ''
          REACT_APP_WC_AUTH_PASS: ''
          REACT_APP_WP_API_BASE: ''
          REACT_APP_WC_API_BASE: ''
          REACT_APP_JWT_ENDPOINT: ''
          REACT_APP_SITE_URL: 'https://elliotttmiller.github.io/drywall-toolbox'
          REACT_APP_APP_ENV: development

      # ── Inject product catalog CSV for GitHub Pages ─────────────────────────
      # frontend/public/product-wp-catalog-yu1a5xf58h.csv is copied into dist/
      # by CopyWebpackPlugin during the build. It serves as a fallback when the
      # remote CSV fetch fails (CORS, network, etc.). The frontend will attempt
      # the remote URL first (REACT_APP_WC_CSV_URL), then fall back to the
      # bundled local copy at <origin>/wp-catalog.csv.
      - name: Verify product catalog was bundled into dist
        run: |
          if [ -f "dist/product-wp-catalog-yu1a5xf58h.csv" ]; then
            echo "✓ Product catalog bundled successfully ($(wc -l < dist/product-wp-catalog-yu1a5xf58h.csv) rows)"
          else
            echo "⚠ Product catalog not found in dist/ — remote fetch will be the only source"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
