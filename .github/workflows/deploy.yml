name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend (webpack → ../dist/)
        run: cd frontend && npm run build
        env:
          NODE_ENV: production
          # GitHub Pages sub-path (repo name); adjust if the Pages site uses a custom domain
          PUBLIC_URL: /drywall-toolbox
          # ── Development catalog: use the bundled wp-catalog.csv ──────────────
          # frontend/public/wp-catalog.csv is copied verbatim into dist/ by
          # CopyWebpackPlugin, so it is served at <origin>/wp-catalog.csv.
          # Setting both flags ensures catalog.js Attempt 0 (local-csv) runs
          # before trying the WooCommerce REST API or PHP proxy endpoints that
          # are unavailable on GitHub Pages.
          REACT_APP_USE_LOCAL_CSV: 'true'
          VITE_USE_LOCAL_CSV: 'true'
          # ── Stub out WP/WC endpoints (not available on GH Pages) ─────────────
          REACT_APP_WP_BASE_URL: ''
          REACT_APP_WC_BASE_URL: ''
          REACT_APP_WC_AUTH_USER: ''
          REACT_APP_WC_AUTH_PASS: ''
          VITE_WP_API_BASE: ''
          VITE_WC_API_BASE: ''
          VITE_JWT_ENDPOINT: ''
          VITE_SITE_URL: 'https://elliotttmiller.github.io/drywall-toolbox'
          VITE_APP_ENV: development

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
