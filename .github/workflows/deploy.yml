name: Controlled Deploy Drywall Toolbox Production

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - deploy
          - restore
        default: deploy
      confirm:
        description: "Type DEPLOY for deploy, or RESTORE for restore"
        required: true
        type: string
      deploy_scope:
        description: "Deploy mode (deploy action only)"
        required: false
        type: choice
        options:
          - full_payload
          - selective
        default: full_payload
      deploy_items:
        description: "Deploy action + selective scope only: comma or newline-separated paths from deploy-root (for example: index.html, assets/js/main.js, wp/wp-content/themes)"
        required: false
        type: string
      backup_run_id:
        description: "Restore only: workflow run ID that contains the backup artifact"
        required: false
        type: string
      backup_artifact_name:
        description: "Restore only: artifact name to restore (for example hostgator-backup-123456789-abc1234-20260530-104500)"
        required: false
        type: string

concurrency:
  group: production-release-control-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  NODE_ENV: production
  # Production domain root. Do not set /drywall-toolbox here; that path is only
  # for GitHub Pages and causes broken asset URLs on drywalltoolbox.com.
  PUBLIC_URL: /
  REACT_APP_WP_BASE_URL: https://drywalltoolbox.com
  REACT_APP_WP_API_BASE: https://drywalltoolbox.com/wp-json
  REACT_APP_JWT_ENDPOINT: https://drywalltoolbox.com/wp-json/simple-jwt-login/v1/auth
  REACT_APP_JWT_AUTH_ENDPOINT: /wp-json/simple-jwt-login/v1/auth
  REACT_APP_API_BASE_URL: https://drywalltoolbox.com
  REACT_APP_DTB_API_BASE: /wp-json/dtb/v1
  REACT_APP_STORE_API_BASE: /wp-json/wc/store/v1
  REACT_APP_SITE_URL: https://drywalltoolbox.com
  REACT_APP_APP_ENV: production
  REACT_APP_ENV: production
  REACT_APP_REWARDS_ENABLED: '1'
  REACT_APP_STORE_LAUNCH_DATE: ''

jobs:
  build-and-package:
    name: Validate and build deployment payload
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci --include=dev --prefer-offline --no-audit --no-fund

      - name: Lint frontend source
        run: cd frontend && npm run lint --if-present

      - name: Build frontend for drywalltoolbox.com
        run: cd frontend && npm run build
        env:
          REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.REACT_APP_STRIPE_PUBLISHABLE_KEY }}

      - name: Assemble deployment payload
        shell: bash
        run: |
          set -euo pipefail

          rm -rf deploy-root
          mkdir -p deploy-root

          # React production output. Upload CONTENTS of dist/ to the web root.
          cp -a dist/. deploy-root/
          cp -a drywalltoolbox/logos deploy-root/logos

          # Live root routing for React + /wp WordPress subdirectory.
          cp drywalltoolbox/.htaccess deploy-root/.htaccess

          # Tracked WordPress application code only. Never deploy wp-config.php,
          # uploads, cache, plugins, or full WordPress core from this repository.
          mkdir -p deploy-root/wp/wp-content
          cp -a drywalltoolbox/wp/.htaccess deploy-root/wp/.htaccess
          cp -a drywalltoolbox/wp/index.php deploy-root/wp/index.php
          cp -a drywalltoolbox/wp/wp-content/mu-plugins deploy-root/wp/wp-content/mu-plugins
          cp -a drywalltoolbox/wp/wp-content/themes deploy-root/wp/wp-content/themes

          echo 'Deployment payload:'
          find deploy-root -maxdepth 3 -type f | sort | sed 's#^#  #' | head -200

      - name: Validate deployment payload boundaries
        shell: bash
        run: |
          set -euo pipefail
          test -f deploy-root/index.html
          test -f deploy-root/.htaccess
          test -f deploy-root/logos/favicon.ico
          test -d deploy-root/assets/js
          test -d deploy-root/assets/css
          test -f deploy-root/wp/.htaccess
          test -f deploy-root/wp/index.php
          test -d deploy-root/wp/wp-content/mu-plugins
          test -d deploy-root/wp/wp-content/themes

          if find deploy-root -name 'wp-config.php' -o -path '*/wp-content/uploads/*' -o -path '*/wp-content/cache/*' | grep -q .; then
            echo 'Refusing to deploy forbidden WordPress runtime/secrets payload.' >&2
            exit 1
          fi

      - name: Upload deployment payload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-payload-${{ github.run_id }}
          path: deploy-root/
          if-no-files-found: error
          retention-days: 14

  backup-remote:
    name: Backup current production state (pre-deploy)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && inputs.confirm == 'DEPLOY' }}
    needs: build-and-package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: hostgator-production
    outputs:
      backup_artifact_name: ${{ steps.meta.outputs.backup_artifact_name }}

    steps:
      - name: Compute backup artifact name
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y%m%d-%H%M%S)"
          short_sha="${GITHUB_SHA::7}"
          echo "backup_artifact_name=hostgator-backup-${GITHUB_RUN_ID}-${short_sha}-${stamp}" >> "$GITHUB_OUTPUT"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Download remote backup snapshot
        shell: bash
        env:
          FTP_HOST: ${{ secrets.HOSTGATOR_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          : "${FTP_HOST:?Missing HOSTGATOR_FTP_HOST secret}"
          : "${FTP_USERNAME:?Missing HOSTGATOR_FTP_USERNAME secret}"
          : "${FTP_PASSWORD:?Missing HOSTGATOR_FTP_PASSWORD secret}"

          REMOTE_DIR="${FTP_REMOTE_DIR:-/public_html/drywalltoolbox}"

          rm -rf backup-root
          mkdir -p backup-root

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set net:max-retries 3
          set net:timeout 30
          set xfer:clobber true
          mirror --verbose --parallel=4 "$REMOTE_DIR" backup-root \
            --exclude-glob .git* \
            --exclude-glob node_modules/** \
            --exclude-glob wp/wp-content/uploads/** \
            --exclude-glob wp/wp-content/cache/** \
            --exclude-glob wp/wp-content/upgrade/**
          bye
          EOF

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.backup_artifact_name }}
          path: backup-root/
          if-no-files-found: error
          retention-days: 30

  deploy-to-hostgator:
    name: Deploy payload to HostGator
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && inputs.confirm == 'DEPLOY' }}
    needs:
      - build-and-package
      - backup-remote
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: hostgator-production

    steps:
      - name: Download deployment payload artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-payload-${{ github.run_id }}
          path: deploy-root

      - name: Validate selective deployment inputs
        if: ${{ inputs.deploy_scope == 'selective' }}
        shell: bash
        env:
          DEPLOY_ITEMS: ${{ inputs.deploy_items }}
        run: |
          set -euo pipefail

          RAW_INPUT="${DEPLOY_ITEMS:-}"
          if [ -z "${RAW_INPUT//[[:space:]]/}" ]; then
            echo "deploy_items is required when deploy_scope=selective." >&2
            exit 1
          fi

          ROOT="$(realpath -m deploy-root)"
          TMP_ITEMS="$(mktemp)"

          printf '%s\n' "$RAW_INPUT" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
            | sed '/^$/d' \
            > "$TMP_ITEMS"

          if [ ! -s "$TMP_ITEMS" ]; then
            echo "No valid deploy_items were provided." >&2
            exit 1
          fi

          echo "Selective deploy manifest:"
          while IFS= read -r rel; do
            rel="${rel#./}"
            abs="$(realpath -m "deploy-root/$rel")"

            if [[ "$abs" != "$ROOT"* ]]; then
              echo "Path escapes deploy-root: $rel" >&2
              exit 1
            fi

            if [ ! -e "$abs" ]; then
              echo "Path not found in deploy payload: $rel" >&2
              exit 1
            fi

            case "$rel" in
              wp-config.php|wp/wp-config.php|wp-content/uploads/*|wp/wp-content/uploads/*|wp-content/cache/*|wp/wp-content/cache/*)
                echo "Forbidden deploy path: $rel" >&2
                exit 1
                ;;
            esac

            echo "  - $rel"
          done < "$TMP_ITEMS"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy full payload to HostGator via FTPS
        if: ${{ inputs.deploy_scope != 'selective' }}
        shell: bash
        env:
          FTP_HOST: ${{ secrets.HOSTGATOR_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          : "${FTP_HOST:?Missing HOSTGATOR_FTP_HOST secret}"
          : "${FTP_USERNAME:?Missing HOSTGATOR_FTP_USERNAME secret}"
          : "${FTP_PASSWORD:?Missing HOSTGATOR_FTP_PASSWORD secret}"

          REMOTE_DIR="${FTP_REMOTE_DIR:-/public_html/drywalltoolbox}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set net:max-retries 3
          set net:timeout 30
          set xfer:clobber true
          mirror --reverse --verbose --parallel=4 --only-newer deploy-root/ "$REMOTE_DIR" \
            --exclude-glob .git* \
            --exclude-glob node_modules/** \
            --exclude-glob wp-config.php \
            --exclude-glob wp/wp-config.php \
            --exclude-glob wp/wp-content/uploads/** \
            --exclude-glob wp/wp-content/cache/** \
            --exclude-glob wp/wp-content/upgrade/**
          bye
          EOF

      - name: Deploy selected files/directories to HostGator via FTPS
        if: ${{ inputs.deploy_scope == 'selective' }}
        shell: bash
        env:
          DEPLOY_ITEMS: ${{ inputs.deploy_items }}
          FTP_HOST: ${{ secrets.HOSTGATOR_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          : "${FTP_HOST:?Missing HOSTGATOR_FTP_HOST secret}"
          : "${FTP_USERNAME:?Missing HOSTGATOR_FTP_USERNAME secret}"
          : "${FTP_PASSWORD:?Missing HOSTGATOR_FTP_PASSWORD secret}"

          REMOTE_DIR="${FTP_REMOTE_DIR:-/public_html/drywalltoolbox}"
          ROOT="$(realpath -m deploy-root)"
          ITEMS_FILE="$(mktemp)"
          CMDS_FILE="$(mktemp)"

          printf '%s\n' "${DEPLOY_ITEMS:-}" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
            | sed '/^$/d' \
            > "$ITEMS_FILE"

          {
            echo "set ftp:ssl-force true"
            echo "set ftp:ssl-protect-data true"
            echo "set ssl:verify-certificate false"
            echo "set net:max-retries 3"
            echo "set net:timeout 30"
            echo "set xfer:clobber true"
          } > "$CMDS_FILE"

          while IFS= read -r rel; do
            rel="${rel#./}"
            abs="$(realpath -m "deploy-root/$rel")"

            if [[ "$abs" != "$ROOT"* ]]; then
              echo "Path escapes deploy-root: $rel" >&2
              exit 1
            fi

            if [ -d "$abs" ]; then
              echo "mirror --reverse --verbose --parallel=2 --only-newer \"$abs\" \"$REMOTE_DIR/$rel\"" >> "$CMDS_FILE"
            else
              parent="$(dirname "$rel")"
              if [ "$parent" = "." ]; then
                parent=""
              fi
              echo "mkdir -p \"$REMOTE_DIR/$parent\"" >> "$CMDS_FILE"
              echo "put -O \"$REMOTE_DIR/$parent\" \"$abs\"" >> "$CMDS_FILE"
            fi
          done < "$ITEMS_FILE"

          echo "bye" >> "$CMDS_FILE"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" -f "$CMDS_FILE"

  production-availability:
    name: Production availability verification
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && inputs.confirm == 'DEPLOY' }}
    needs: deploy-to-hostgator
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify production entrypoints
        shell: bash
        run: |
          set -euo pipefail
          for url in \
            https://drywalltoolbox.com/ \
            https://drywalltoolbox.com/assets/js/main.js \
            https://drywalltoolbox.com/assets/css/main.css \
            https://drywalltoolbox.com/wp-admin/; do
            echo "Verifying $url"
            curl -I --fail --location --max-time 20 "$url"
          done

  rollback-on-failure:
    name: Roll back automatically if production verification fails
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && inputs.confirm == 'DEPLOY' && needs.production-availability.result == 'failure' }}
    needs:
      - backup-remote
      - production-availability
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: hostgator-production

    steps:
      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.backup-remote.outputs.backup_artifact_name }}
          path: backup-root

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Restore backup snapshot to HostGator
        shell: bash
        env:
          FTP_HOST: ${{ secrets.HOSTGATOR_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          : "${FTP_HOST:?Missing HOSTGATOR_FTP_HOST secret}"
          : "${FTP_USERNAME:?Missing HOSTGATOR_FTP_USERNAME secret}"
          : "${FTP_PASSWORD:?Missing HOSTGATOR_FTP_PASSWORD secret}"

          REMOTE_DIR="${FTP_REMOTE_DIR:-/public_html/drywalltoolbox}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set net:max-retries 3
          set net:timeout 30
          set xfer:clobber true
          mirror --reverse --verbose --parallel=4 --overwrite backup-root/ "$REMOTE_DIR"
          bye
          EOF

      - name: Fail workflow after rollback
        shell: bash
        run: |
          echo "Production verification failed. Automatic rollback executed from artifact '${{ needs.backup-remote.outputs.backup_artifact_name }}'." >&2
          exit 1

  restore-from-backup:
    name: Manually restore from backup artifact
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'restore' && inputs.confirm == 'RESTORE' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: hostgator-production

    steps:
      - name: Validate restore inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ inputs.backup_run_id }}"
          test -n "${{ inputs.backup_artifact_name }}"

      - name: Download selected backup artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.backup_artifact_name }}
          run-id: ${{ inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: backup-root

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Restore backup snapshot to HostGator
        shell: bash
        env:
          FTP_HOST: ${{ secrets.HOSTGATOR_FTP_HOST }}
          FTP_USERNAME: ${{ secrets.HOSTGATOR_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.HOSTGATOR_FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.HOSTGATOR_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail

          : "${FTP_HOST:?Missing HOSTGATOR_FTP_HOST secret}"
          : "${FTP_USERNAME:?Missing HOSTGATOR_FTP_USERNAME secret}"
          : "${FTP_PASSWORD:?Missing HOSTGATOR_FTP_PASSWORD secret}"

          REMOTE_DIR="${FTP_REMOTE_DIR:-/public_html/drywalltoolbox}"

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set net:max-retries 3
          set net:timeout 30
          set xfer:clobber true
          mirror --reverse --verbose --parallel=4 --overwrite backup-root/ "$REMOTE_DIR"
          bye
          EOF
