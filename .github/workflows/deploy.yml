name: Deploy WordPress Theme & Plugin to HostGator

on:
  push:
    branches:
      - main
    paths:
      - 'wp/wp-content/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy to HostGator
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate wp-content structure
        run: |
          echo "PWD=$(pwd)"
          echo "-- root files --"
          ls -la
          echo "-- wp folder --"
          ls -la wp || true
          echo "-- wp/wp-content --"
          ls -la wp/wp-content || true
          echo "-- themes --"
          ls -la wp/wp-content/themes || true
          echo "-- plugins --"
          ls -la wp/wp-content/plugins || true

      - name: Setup Node.js (for building React assets)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (webpack)
        # Builds production assets into wp/wp-content/themes/drywall-toolbox/dist
        run: npm run build
        # Pass build-time secrets into the Node process so webpack/DefinePlugin
        # can inject them into the compiled bundle. Add PUBLIC_URL if you need
        # to serve from a subpath (e.g. /drywall-toolbox/).
        env:
          REACT_APP_WP_BASE_URL: ${{ secrets.REACT_APP_WP_BASE_URL }}
          REACT_APP_WC_BASE_URL: ${{ secrets.REACT_APP_WC_BASE_URL }}
          REACT_APP_WC_CONSUMER_KEY: ${{ secrets.REACT_APP_WC_CONSUMER_KEY }}
          REACT_APP_WC_CONSUMER_SECRET: ${{ secrets.REACT_APP_WC_CONSUMER_SECRET }}
          VITE_WOOCOMMERCE_STORE_URL: ${{ secrets.VITE_WOOCOMMERCE_STORE_URL }}
          VITE_WOOCOMMERCE_CONSUMER_KEY: ${{ secrets.VITE_WOOCOMMERCE_CONSUMER_KEY }}
          VITE_WOOCOMMERCE_CONSUMER_SECRET: ${{ secrets.VITE_WOOCOMMERCE_CONSUMER_SECRET }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}

      - name: Deploy themes and plugins via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTGATOR_FTP_HOST }}
          username: ${{ secrets.HOSTGATOR_FTP_USER }}
          password: ${{ secrets.HOSTGATOR_FTP_PASS }}
          protocol: ftps
          port: ${{ secrets.HOSTGATOR_FTP_PORT }}
          # server-dir must match the FTP account's document-root on HostGator.
          # If the FTP account's home is the cPanel user home directory, use
          # /public_html/wp-content/.  If the FTP account's home is already
          # public_html/, use /wp-content/. Adjust to match your cPanel setup.
          server-dir: /public_html/wp-content/
          local-dir: ./wp/wp-content/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.log
            **/.env*
            **/.gitignore
            **/README.md
            **/twentytwenty*/**
            **/yith-wonder/**
            **/*.bak
          dangerous-clean-slate: false
          log-level: verbose
          dry-run: false
          timeout: 60000

      - name: Deployment complete
        if: always()
        run: echo "✓ Deployed to HostGator at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"