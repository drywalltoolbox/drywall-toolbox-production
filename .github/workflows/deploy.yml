name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend (webpack → ../dist/)
        run: cd frontend && npm run build
        env:
          NODE_ENV: production
          # GitHub Pages sub-path (repo name); adjust if the Pages site uses a custom domain
          PUBLIC_URL: /drywall-toolbox
          # ── GitHub Pages: Try remote CSV with local fallback ───────────────
          # The frontend will attempt to fetch the remote CSV first (priority in
          # getCsvUrl()). If that fails (network, CORS, etc.), catalog.js falls
          # back to the bundled local CSV.
          REACT_APP_WC_CSV_URL: 'https://drywalltoolbox.com/wp/wp-content/uploads/wc-imports/product-wp-catalog-yu1a5xf58h.csv'
          # Keep local CSV bundled as fallback
          REACT_APP_USE_LOCAL_CSV: 'true'
          # ── Stub out WP/WC endpoints (not available on GH Pages) ─────────────
          REACT_APP_WP_BASE_URL: ''
          REACT_APP_WC_BASE_URL: ''
          REACT_APP_WC_AUTH_USER: ''
          REACT_APP_WC_AUTH_PASS: ''
          REACT_APP_WP_API_BASE: ''
          REACT_APP_WC_API_BASE: ''
          REACT_APP_JWT_ENDPOINT: ''
          REACT_APP_SITE_URL: 'https://elliotttmiller.github.io/drywall-toolbox'
          REACT_APP_APP_ENV: development

      # ── Inject product catalog CSV for GitHub Pages ─────────────────────────
      # scraped_results/wp-catalog.csv is the canonical offline product catalog.
      # It is NOT bundled by webpack (scraped_results/ is excluded from the
      # CopyWebpackPlugin glob), so we copy it manually into dist/ here.
      # On GitHub Pages this file is served at <origin>/wp-catalog.csv, which
      # is exactly what catalog.js Attempt 0 fetches when USE_LOCAL_CSV=true.
      # Production (HostGator) is unaffected — it never sets USE_LOCAL_CSV.
      - name: Copy product catalog CSV into dist for GitHub Pages
        run: |
          if [ -f "scraped_results/wp-catalog.csv" ]; then
            cp scraped_results/wp-catalog.csv dist/wp-catalog.csv
            echo "✓ Copied scraped_results/wp-catalog.csv → dist/wp-catalog.csv ($(wc -l < scraped_results/wp-catalog.csv) rows)"
          else
            echo "⚠ scraped_results/wp-catalog.csv not found — catalog will be empty on GitHub Pages"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
