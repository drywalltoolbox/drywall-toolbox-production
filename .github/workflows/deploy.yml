name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend (webpack → ../dist/)
        run: cd frontend && npm run build
        env:
          NODE_ENV: production
          # GitHub Pages sub-path (repo name); adjust if the Pages site uses a custom domain
          PUBLIC_URL: /drywall-toolbox
          # ── GitHub Pages: fetch live catalog from drywalltoolbox.com ──────────
          # catalog.js will fetch from the live WC REST API / PHP proxy endpoints.
          # The bundled wp-catalog.csv serves as a fallback if the remote is down.
          REACT_APP_WC_CSV_URL: ''
          REACT_APP_USE_LOCAL_CSV: 'false'
          # ── Live backend endpoints ─────────────────────────────────────────────
          REACT_APP_WP_BASE_URL: 'https://drywalltoolbox.com/wp'
          REACT_APP_WC_BASE_URL: 'https://drywalltoolbox.com/wp/wp-json/wc/v3'
          REACT_APP_WC_AUTH_USER: ${{ secrets.WC_AUTH_USER }}
          REACT_APP_WC_AUTH_PASS: ${{ secrets.WC_AUTH_PASS }}
          REACT_APP_WP_API_BASE: 'https://drywalltoolbox.com/wp/wp-json'
          REACT_APP_WC_API_BASE: 'https://drywalltoolbox.com/wp/wp-json/wc/v3'
          REACT_APP_JWT_ENDPOINT: 'https://drywalltoolbox.com/wp/wp-json/simple-jwt-login/v1/auth'
          REACT_APP_API_BASE_URL: 'https://drywalltoolbox.com'
          REACT_APP_STORE_API_BASE: '/wp/wp-json/wc/store/v1'
          REACT_APP_SITE_URL: 'https://elliotttmiller.github.io/drywall-toolbox'
          REACT_APP_APP_ENV: development
          REACT_APP_ENV: development

      # ── Verify bundled CSV fallback exists in dist ──────────────────
      # wp-catalog.csv is copied into dist/ by webpack during the build.
      # It acts as the offline/fallback catalog if the live API is unreachable.
      - name: Verify bundled CSV fallback exists in dist
        run: |
          if [ -f "dist/wp-catalog.csv" ]; then
            echo "✓ Fallback catalog bundled successfully ($(wc -l < dist/wp-catalog.csv) rows)"
          else
            echo "⚠ Fallback catalog not found in dist/ — live API is the only data source"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
