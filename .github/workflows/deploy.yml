name: Deploy WordPress Theme & Plugin to HostGator

on:
  push:
    branches:
      - main
    paths:
      - 'wp/wp-content/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy to HostGator
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate wp-content structure
        run: |
          echo "PWD=$(pwd)"
          echo "-- root files --"
          ls -la
          echo "-- wp folder --"
          ls -la wp || true
          echo "-- wp/wp-content --"
          ls -la wp/wp-content || true
          echo "-- themes --"
          ls -la wp/wp-content/themes || true
          echo "-- plugins --"
          ls -la wp/wp-content/plugins || true

      - name: Setup Node.js (for building React assets)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (webpack)
        # Builds production assets into wp/wp-content/themes/drywall-toolbox/dist
        run: npm run build
        # Pass build-time secrets into the Node process so webpack/DefinePlugin
        # can inject them into the compiled bundle. Add PUBLIC_URL if you need
        # to serve from a subpath (e.g. /drywall-toolbox/).
        env:
          REACT_APP_WP_BASE_URL: ${{ secrets.REACT_APP_WP_BASE_URL }}
          REACT_APP_WC_BASE_URL: ${{ secrets.REACT_APP_WC_BASE_URL }}
          REACT_APP_WC_CONSUMER_KEY: ${{ secrets.REACT_APP_WC_CONSUMER_KEY }}
          REACT_APP_WC_CONSUMER_SECRET: ${{ secrets.REACT_APP_WC_CONSUMER_SECRET }}
          VITE_WOOCOMMERCE_STORE_URL: ${{ secrets.VITE_WOOCOMMERCE_STORE_URL }}
          VITE_WOOCOMMERCE_CONSUMER_KEY: ${{ secrets.VITE_WOOCOMMERCE_CONSUMER_KEY }}
          VITE_WOOCOMMERCE_CONSUMER_SECRET: ${{ secrets.VITE_WOOCOMMERCE_CONSUMER_SECRET }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}

      - name: Deploy themes and plugins via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTGATOR_FTP_HOST }}
          username: ${{ secrets.HOSTGATOR_FTP_USER }}
          password: ${{ secrets.HOSTGATOR_FTP_PASS }}
          protocol: ftps
          port: ${{ secrets.HOSTGATOR_FTP_PORT }}
          # server-dir must match the FTP account's document-root on HostGator.
          # Use the full path to the site's public HTML if your FTP user is
          # anchored at the account home. For this host the site home is:
          # /home1/benconklin/public_html/website_a246e6a8
          # Adjusted to match the File Manager path you provided which includes
          # an extra public_html folder.
          server-dir: /home1/benconklin/public_html/website_a246e6a8/public_html/wp-content/
          local-dir: ./wp/wp-content/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.log
            **/.env*
            **/.gitignore
            **/README.md
            **/twentytwenty*/**
            **/yith-wonder/**
            **/*.bak
            **/*.map
            **/products_catalog.csv
          dangerous-clean-slate: false
          log-level: verbose
          dry-run: false
          timeout: 300000

      - name: Prune generated maps & large CSVs before upload
        run: |
          echo "Pruning source maps and large CSVs to speed up upload..."
          # remove source maps from the generated theme dist (if any)
          if [ -d "wp/wp-content/themes/drywall-toolbox/dist" ]; then
            find wp/wp-content/themes/drywall-toolbox/dist -type f -name "*.map" -print -delete || true
          fi
          # remove large products CSV if present in the theme assets
          find wp/wp-content/themes/drywall-toolbox -type f -name "products_catalog.csv" -print -delete || true

      - name: Deployment complete
        if: always()
        run: echo "✓ Deployed to HostGator at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

      - name: Post-deploy verification (manifest)
        if: always()
        run: |
          echo "Checking asset-manifest.json on live site..."
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://drywalltoolbox.com/wp-content/themes/drywall-toolbox/dist/asset-manifest.json" || echo "000")
          echo "HTTP status for asset-manifest.json: $code"
          if [ "$code" != "200" ]; then
            echo "Warning: asset-manifest.json not reachable (status $code). If deploy just finished, re-run workflow or check HostGator File Manager.";
            exit 0
          fi