name: Build, Validate & Deploy

# Trigger on main branch pushes and manual dispatch.
# This workflow combines build, Lighthouse CI validation, and GitHub Pages deployment
# into a single controlled pipeline with quality gates and artifact reuse.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 1: Build Frontend (single build, reusable artifact)
  # ─────────────────────────────────────────────────────────────────────────────
  # This stage builds the frontend once with the GitHub Pages configuration.
  # The build artifact is uploaded and reused by both deployment and Lighthouse CI.
  # This saves ~60 seconds per workflow run by eliminating duplicate builds.

  build:
    name: Build React Frontend
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --prefer-offline --no-audit --no-fund

      - name: Lint frontend
        run: cd frontend && npm run lint --if-present

      - name: Build frontend (webpack → ../dist/)
        run: cd frontend && npm run build
        env:
          NODE_ENV: production
          # GitHub Pages sub-path (repo name); adjust if the Pages site uses a custom domain
          PUBLIC_URL: /drywall-toolbox
          # ── Live backend endpoints ─────────────────────────────────────────────
          # Use the domain-root canonical URLs — the root .htaccess rewrites
          # /wp-json/* → /wp/wp-json/* so our CORS mu-plugin intercepts correctly.
          # Avoid /wp/wp-json/ directly: it bypasses the rewrite alias and CORS handler.
          REACT_APP_WP_BASE_URL: 'https://drywalltoolbox.com'
          REACT_APP_WC_BASE_URL: 'https://drywalltoolbox.com/wp-json/wc/v3'
          REACT_APP_WP_API_BASE: 'https://drywalltoolbox.com/wp-json'
          REACT_APP_WC_API_BASE: 'https://drywalltoolbox.com/wp-json/wc/v3'
          REACT_APP_JWT_ENDPOINT: 'https://drywalltoolbox.com/wp-json/simple-jwt-login/v1/auth'
          REACT_APP_API_BASE_URL: 'https://drywalltoolbox.com'
          # Use the /wp-json/ canonical alias — the root .htaccess rewrites this
          # to /wp/wp-json/ so the DTB CORS handler intercepts correctly.
          REACT_APP_STORE_API_BASE: '/wp-json/wc/store/v1'
          REACT_APP_SITE_URL: 'https://elliotttmiller.github.io/drywall-toolbox'
          REACT_APP_APP_ENV: production
          REACT_APP_ENV: production
          # Founding-member promo window — ISO-8601 date; leave blank to disable
          REACT_APP_STORE_LAUNCH_DATE: ''

      - name: Upload Pages artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 2: Validate Performance (Lighthouse CI)
  # ─────────────────────────────────────────────────────────────────────────────
  # This stage runs Lighthouse CI against the production site to validate
  # performance metrics BEFORE deployment. Results are available before the site
  # goes live, creating a quality gate opportunity.
  #
  # Note: This builds the frontend again with production configuration to test
  # the actual production bundle. This is intentional to catch any build-config
  # specific performance issues before production.

  lighthouse-ci:
    name: Lighthouse CI Performance Validation
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend (production config for Lighthouse testing)
        run: cd frontend && npm run build
        env:
          NODE_ENV: production
          # Test with root path (production config) to catch real-world issues
          PUBLIC_URL: ''
          REACT_APP_WP_BASE_URL: 'https://drywalltoolbox.com'
          REACT_APP_WC_BASE_URL: 'https://drywalltoolbox.com/wp-json/wc/v3'
          REACT_APP_WP_API_BASE: 'https://drywalltoolbox.com/wp-json'
          REACT_APP_WC_API_BASE: 'https://drywalltoolbox.com/wp-json/wc/v3'
          REACT_APP_JWT_ENDPOINT: 'https://drywalltoolbox.com/wp-json/simple-jwt-login/v1/auth'
          REACT_APP_API_BASE_URL: 'https://drywalltoolbox.com'
          REACT_APP_STORE_API_BASE: '/wp-json/wc/store/v1'
          REACT_APP_SITE_URL: 'https://drywalltoolbox.com'
          REACT_APP_APP_ENV: production
          REACT_APP_ENV: production
          REACT_APP_STORE_LAUNCH_DATE: ''

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 3: PHP Lint — syntax-check all mu-plugins
  # ─────────────────────────────────────────────────────────────────────────────
  php-lint:
    name: PHP Syntax Lint (mu-plugins)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none

      - name: Lint all mu-plugin PHP files
        run: |
          find wp/wp-content/mu-plugins -name '*.php' -print0 \
            | xargs -0 -P4 php -l \
            | grep -v '^No syntax errors' || true
          # Fail the step if any file produced a parse error
          find wp/wp-content/mu-plugins -name '*.php' -print0 \
            | xargs -0 -P4 php -l 2>&1 \
            | grep -v '^No syntax errors' \
            | grep -q 'Parse error' && exit 1 || exit 0

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 4: DTB API Smoke Test
  # ─────────────────────────────────────────────────────────────────────────────
  dtb-api-smoke:
    name: DTB Catalog API Smoke Test
    runs-on: ubuntu-latest
    needs: php-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run DTB catalog API smoke test
        shell: pwsh
        run: |
          $maxAttempts = 3
          $attempt = 0
          $success = $false
          while ($attempt -lt $maxAttempts -and -not $success) {
            $attempt++
            Write-Host "Smoke test attempt $attempt of $maxAttempts"
            try {
              & ./scripts/smoke-dtb-catalog-api.ps1
              $success = $true
            } catch {
              Write-Warning "Attempt $attempt failed: $_"
              if ($attempt -lt $maxAttempts) { Start-Sleep -Seconds 5 }
            }
          }
          if (-not $success) {
            Write-Error "All $maxAttempts smoke test attempts failed."
            exit 1
          }

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGE 5: Deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────────────────────
  # This stage deploys the built artifact from Stage 1 to GitHub Pages only if:
  # 1. The build succeeded
  # 2. Lighthouse CI validation completed (passed, warned, or failed)
  # 3. PHP lint passed (no parse errors in mu-plugins)
  # 4. DTB API smoke test passed
  #
  # By default, deployment happens regardless of Lighthouse results. To add a
  # quality gate that blocks deployment on Lighthouse errors, uncomment the `if`
  # condition below. Current behavior allows deployment even if Lighthouse fails
  # (results are informational but visible in PR/commit).

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, lighthouse-ci, php-lint, dtb-api-smoke]
    # Uncomment the following line to block deployment on Lighthouse CI failures:
    # if: ${{ success() || contains(needs.lighthouse-ci.result, 'warning') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
